ght:700;color:${low?'#E05C5C':'#5CAB7D'}\">${st.rate}%<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      ${low?`<div class=\"badge red\" style=\"width:100%;justify-content:center;margin-bottom:12px\"><i data-lucide=\"alert-triangle\" style=\"width:13px\"><\u002Fi> Below 85% threshold<\u002Fdiv>`:''}\n      <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:8px;text-align:center\">\n        <div><div class=\"mono\" style=\"font-size:18px;font-weight:600\">${st.present}<\u002Fdiv><div class=\"muted\" style=\"font-size:11px\">Present<\u002Fdiv><\u002Fdiv>\n        <div><div class=\"mono\" style=\"font-size:18px;font-weight:600\">${st.absent}<\u002Fdiv><div class=\"muted\" style=\"font-size:11px\">Absent<\u002Fdiv><\u002Fdiv>\n        <div><div class=\"mono\" style=\"font-size:18px;font-weight:600\">${st.excused}<\u002Fdiv><div class=\"muted\" style=\"font-size:11px\">Excused<\u002Fdiv><\u002Fdiv>\n        <div><div class=\"mono\" style=\"font-size:18px;font-weight:600\">${st.total}<\u002Fdiv><div class=\"muted\" style=\"font-size:11px\">Days<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join('');\n\n  view.querySelector('#amPrev').onclick=()=>{ UI.attMonth=ymd(new Date(year,month-1,1)); RENDERERS.attendance(view); lucide.createIcons(); };\n  view.querySelector('#amNext').onclick=()=>{ UI.attMonth=ymd(new Date(year,month+1,1)); RENDERERS.attendance(view); lucide.createIcons(); };\n  view.querySelectorAll('#amScope button').forEach(b=> b.onclick=()=>{ UI.attScope=b.dataset.s; RENDERERS.attendance(view); lucide.createIcons(); });\n  view.querySelector('#amFill').onclick=()=>{ const ds=ymd(appToday()); students.forEach(s=>{ if(!isWeekend(appToday())&&!holidays.has(ds)) DB.attendance[`${s.id}|${ds}`]='present'; }); save(true); RENDERERS.attendance(view); lucide.createIcons(); };\n  view.querySelectorAll('.att-c[data-stu]').forEach(c=>{\n    c.onclick=()=>{ const key=`${c.dataset.stu}|${c.dataset.date}`; const cur=DB.attendance[key]||''; const next=ATT_CYCLE[(ATT_CYCLE.indexOf(cur)+1)%ATT_CYCLE.length];\n      if(next) DB.attendance[key]=next; else delete DB.attendance[key]; save(); RENDERERS.attendance(view); lucide.createIcons(); };\n  });\n  lucide.createIcons();\n};\n\n/* ============================================================\n   TAB 5 — GRADES\n   ============================================================ */\nRENDERERS.grades = function(view){\n  const students=activeStudents();\n  if(!students.length){ view.innerHTML=`<div class=\"empty card pad\"><i data-lucide=\"graduation-cap\"><\u002Fi><h3>No active students<\u002Fh3><\u002Fdiv>`; lucide.createIcons(); return; }\n  if(!UI.gradeStudent || !students.find(s=>s.id===UI.gradeStudent)) UI.gradeStudent=students[0].id;\n  const stu=studentById(UI.gradeStudent);\n  if(!DB.grades[stu.id]) DB.grades[stu.id]={};\n  if(!UI.gradeSubject || !stu.subjects.find(s=>s.id===UI.gradeSubject)) UI.gradeSubject=stu.subjects[0]?stu.subjects[0].id:null;\n\n  view.innerHTML=`\n    <div class=\"tabstrip\" id=\"grStuTabs\">\n      ${students.map(s=>`<button class=\"${s.id===UI.gradeStudent?'on':''}\" data-s=\"${s.id}\" style=\"${s.id===UI.gradeStudent?`background:${studentColor(s)}`:''}\"><span class=\"dot\" style=\"background:${studentColor(s)}\"><\u002Fspan>${esc(s.name.split(' ')[0])}<\u002Fbutton>`).join('')}\n    <\u002Fdiv>\n\n    <div class=\"grid\" style=\"grid-template-columns:repeat(auto-fill,minmax(220px,1fr));margin-bottom:22px\" id=\"grStats\"><\u002Fdiv>\n\n    <div class=\"row\" style=\"gap:20px;align-items:flex-start;flex-wrap:wrap\">\n      <div style=\"flex:2;min-width:340px\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:12px\">\n          <label class=\"fld\" style=\"margin:0;min-width:220px\"><span>Subject<\u002Fspan>\n            <select class=\"input\" id=\"grSubjSel\">${stu.subjects.map(su=>`<option value=\"${su.id}\" ${su.id===UI.gradeSubject?'selected':''}>${esc(su.name)}<\u002Foption>`).join('')}<\u002Fselect>\n          <\u002Flabel>\n          <button class=\"btn primary sm\" id=\"grAddRow\" style=\"align-self:flex-end\"><i data-lucide=\"plus\"><\u002Fi> Add assessment<\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"card\" style=\"overflow:hidden\" id=\"grTableWrap\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;min-width:280px\">\n        <div class=\"card pad\" style=\"margin-bottom:16px\">\n          <div class=\"section-title\"><i data-lucide=\"target\"><\u002Fi> Overall GPA<\u002Fdiv>\n          <div style=\"text-align:center;margin-bottom:8px\"><span class=\"mono\" style=\"font-size:42px;font-weight:700\" id=\"grGpa\">–<\u002Fspan><span class=\"muted\" style=\"font-size:18px\"> / 4.0<\u002Fspan><\u002Fdiv>\n          <div style=\"position:relative;height:170px\"><canvas id=\"grDonut\"><\u002Fcanvas><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card pad\" id=\"grBestWorst\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  `;\n  view.querySelectorAll('#grStuTabs button').forEach(b=> b.onclick=()=>{ UI.gradeStudent=b.dataset.s; UI.gradeSubject=null; RENDERERS.grades(view); lucide.createIcons(); });\n  view.querySelector('#grSubjSel').onchange=e=>{ UI.gradeSubject=e.target.value; renderGradeTable(view,stu); };\n  view.querySelector('#grAddRow').onclick=()=>{ const list=DB.grades[stu.id][UI.gradeSubject]||(DB.grades[stu.id][UI.gradeSubject]=[]);\n    list.push({id:uid(),name:'New assessment',date:ymd(appToday()),score:0,max:100,weight:10,type:'Written',notes:''}); save(); renderGradeTable(view,stu); };\n\n  renderGradeStats(view,stu);\n  renderGradeTable(view,stu);\n  renderGpaPanel(view,stu);\n  lucide.createIcons();\n};\n\nfunction renderGradeStats(view,stu){\n  const el=view.querySelector('#grStats');\n  el.innerHTML = stu.subjects.map(su=>{ const avg=subjectAverage(stu.id,su.id); const list=(DB.grades[stu.id][su.id])||[];\n    const gl=avg!=null?gradeLetterFor(avg):null;\n    return `<div class=\"stat\" style=\"cursor:pointer\" data-subj=\"${su.id}\">\n      <div class=\"k\"><span class=\"dot\" style=\"background:${su.color}\"><\u002Fspan>${esc(su.name)}<\u002Fdiv>\n      <div class=\"v\">${avg!=null?avg+'<small>%<\u002Fsmall>':'<small>—<\u002Fsmall>'} ${gl?`<span class=\"badge ${gl.gpa>=3?'green':gl.gpa>=2?'amber':'red'}\" style=\"font-size:13px;vertical-align:middle\">${gl.g}<\u002Fspan>`:''}<\u002Fdiv>\n      <div class=\"sub\">${list.length} assessment${list.length===1?'':'s'}<\u002Fdiv>\n      <div class=\"spark\" style=\"margin-top:8px;height:26px\">${list.slice(-8).map(a=>{ const p=a.max?(a.score/a.max)*100:0; return `<span style=\"height:${Math.max(8,p)}%;background:${su.color}\"><\u002Fspan>`; }).join('')||'<span style=\"opacity:0\"><\u002Fspan>'}<\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join('');\n  el.querySelectorAll('[data-subj]').forEach(s=> s.onclick=()=>{ UI.gradeSubject=s.dataset.subj; view.querySelector('#grSubjSel').value=s.dataset.subj; renderGradeTable(view,stu); });\n}\n\nfunction renderGradeTable(view,stu){\n  const subjId=UI.gradeSubject; const su=stu.subjects.find(x=>x.id===subjId);\n  const wrap=view.querySelector('#grTableWrap');\n  if(!su){ wrap.innerHTML=`<div class=\"empty\" style=\"padding:30px\"><p>No subjects for this student.<\u002Fp><\u002Fdiv>`; return; }\n  const list=DB.grades[stu.id][subjId]||[];\n  wrap.innerHTML=`<table class=\"tbl\"><thead><tr><th>Assessment<\u002Fth><th>Date<\u002Fth><th>Score<\u002Fth><th>Max<\u002Fth><th>Weight<\u002Fth><th>%<\u002Fth><th>Type<\u002Fth><th><\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>${list.map((a,i)=>{ const pct=a.max?Math.round((a.score/a.max)*1000)/10:0;\n      return `<tr data-i=\"${i}\">\n        <td><input class=\"tbl-edit\" data-f=\"name\" value=\"${esc(a.name)}\" style=\"min-width:130px\" /><\u002Ftd>\n        <td><input class=\"tbl-edit\" type=\"date\" data-f=\"date\" value=\"${a.date}\" /><\u002Ftd>\n        <td style=\"width:64px\"><input class=\"tbl-edit mono\" type=\"number\" data-f=\"score\" value=\"${a.score}\" /><\u002Ftd>\n        <td style=\"width:64px\"><input class=\"tbl-edit mono\" type=\"number\" data-f=\"max\" value=\"${a.max}\" /><\u002Ftd>\n        <td style=\"width:64px\"><input class=\"tbl-edit mono\" type=\"number\" data-f=\"weight\" value=\"${a.weight}\" /><\u002Ftd>\n        <td class=\"mono\" style=\"font-weight:600;color:${pct>=70?'#3c8159':pct>=50?'#a9750f':'#c0392b'}\">${pct}%<\u002Ftd>\n        <td><select class=\"tbl-edit\" data-f=\"type\">${ASSESS_TYPES.map(t=>`<option ${t===a.type?'selected':''}>${t}<\u002Foption>`).join('')}<\u002Fselect><\u002Ftd>\n        <td><button class=\"btn icon ghost grDel\" data-i=\"${i}\" style=\"color:#E05C5C;padding:5px\"><i data-lucide=\"trash-2\" style=\"width:15px\"><\u002Fi><\u002Fbutton><\u002Ftd>\n      <\u002Ftr>`; }).join('') || `<tr><td colspan=\"8\" style=\"text-align:center;padding:26px;color:var(--text-muted)\">No assessments yet. Click \"Add assessment\".<\u002Ftd><\u002Ftr>`}<\u002Ftbody>\n  <\u002Ftable>`;\n  wrap.querySelectorAll('.tbl-edit').forEach(inp=>{ const tr=inp.closest('tr'); const i=+tr.dataset.i; const f=inp.dataset.f;\n    inp.onchange=()=>{ const a=DB.grades[stu.id][subjId][i]; a[f]= (f==='score'||f==='max'||f==='weight')? (+inp.value||0) : inp.value; save(); renderGradeStats(view,stu); renderGradeTable(view,stu); renderGpaPanel(view,stu); lucide.createIcons(); };\n  });\n  wrap.querySelectorAll('.grDel').forEach(b=> b.onclick=()=>{ DB.grades[stu.id][subjId].splice(+b.dataset.i,1); save(); renderGradeStats(view,stu); renderGradeTable(view,stu); renderGpaPanel(view,stu); lucide.createIcons(); });\n  lucide.createIcons();\n}\n\nfunction renderGpaPanel(view,stu){\n  const gpa=studentGPA(stu.id);\n  view.querySelector('#grGpa').textContent = gpa!=null? gpa.toFixed(2) : '–';\n  // grade distribution\n  const dist={A:0,B:0,C:0,D:0,F:0};\n  stu.subjects.forEach(su=>{ const avg=subjectAverage(stu.id,su.id); if(avg!=null) dist[gradeLetterFor(avg).g]++; });\n  if(charts.grDonut) charts.grDonut.destroy();\n  const ctx=view.querySelector('#grDonut'); if(ctx){\n    charts.grDonut=new Chart(ctx,{type:'doughnut',data:{labels:['A','B','C','D','F'],datasets:[{data:[dist.A,dist.B,dist.C,dist.D,dist.F],backgroundColor:['#5CAB7D','#7EC8A4','#F9E784','#F7C59F','#E05C5C'],borderWidth:2,borderColor:cssVar('--surface')}]},\n      options:{cutout:'62%',plugins:{legend:{position:'bottom',labels:{color:cssVar('--text-muted'),font:{size:11},padding:10,boxWidth:12}}},maintainAspectRatio:false}});\n  }\n  // best/worst\n  let best=null,worst=null;\n  stu.subjects.forEach(su=>{ const avg=subjectAverage(stu.id,su.id); if(avg==null)return; if(!best||avg>best.avg)best={su,avg}; if(!worst||avg<worst.avg)worst={su,avg}; });\n  view.querySelector('#grBestWorst').innerHTML=`<div class=\"section-title\"><i data-lucide=\"trending-up\"><\u002Fi> Highlights<\u002Fdiv>\n    ${best?`<div style=\"display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed var(--border)\"><span style=\"font-weight:600\">Strongest<\u002Fspan><span><span class=\"dot\" style=\"background:${best.su.color};display:inline-block;margin-right:6px\"><\u002Fspan>${esc(best.su.name)} <b class=\"mono\">${best.avg}%<\u002Fb><\u002Fspan><\u002Fdiv>`:''}\n    ${worst&&worst.su!==(best&&best.su)?`<div style=\"display:flex;justify-content:space-between;padding:8px 0\"><span style=\"font-weight:600\">Focus area<\u002Fspan><span><span class=\"dot\" style=\"background:${worst.su.color};display:inline-block;margin-right:6px\"><\u002Fspan>${esc(worst.su.name)} <b class=\"mono\">${worst.avg}%<\u002Fb><\u002Fspan><\u002Fdiv>`:''}\n    ${!best?'<p class=\"muted\" style=\"font-size:13px\">Add assessments to see highlights.<\u002Fp>':''}`;\n  lucide.createIcons();\n}\n\n/* ============================================================\n   TAB 6 — READING TRACKER\n   ============================================================ */\nRENDERERS.reading = function(view){\n  const students=activeStudents();\n  if(!students.length){ view.innerHTML=`<div class=\"empty card pad\"><i data-lucide=\"library\"><\u002Fi><h3>No active students<\u002Fh3><\u002Fdiv>`; lucide.createIcons(); return; }\n  if(!UI.readStudent || !students.find(s=>s.id===UI.readStudent)) UI.readStudent=students[0].id;\n  const stu=studentById(UI.readStudent);\n  const books=DB.reading.filter(b=>b.student===stu.id);\n  const filtered = UI.readFilter==='All'? books : books.filter(b=>b.status===UI.readFilter);\n  const yr=appToday().getFullYear();\n  const completed=books.filter(b=>b.status==='Completed');\n  const completedYr=completed.filter(b=>b.finished&&b.finished.startsWith(yr));\n  const pagesYr=completedYr.reduce((s,b)=>s+(b.pages||0),0);\n  const genreCount={}; books.forEach(b=>{ genreCount[b.genre]=(genreCount[b.genre]||0)+1; });\n  const favGenre=Object.keys(genreCount).sort((a,b)=>genreCount[b]-genreCount[a])[0]||'—';\n\n  view.innerHTML=`\n    <div class=\"tabstrip\" id=\"rdStuTabs\">\n      ${students.map(s=>`<button class=\"${s.id===UI.readStudent?'on':''}\" data-s=\"${s.id}\" style=\"${s.id===UI.readStudent?`background:${studentColor(s)}`:''}\"><span class=\"dot\" style=\"background:${studentColor(s)}\"><\u002Fspan>${esc(s.name.split(' ')[0])}<\u002Fbutton>`).join('')}\n    <\u002Fdiv>\n    <div class=\"grid\" style=\"grid-template-columns:repeat(auto-fill,minmax(180px,1fr));margin-bottom:22px\">\n      <div class=\"stat\"><div class=\"k\"><i data-lucide=\"book-check\"><\u002Fi> Completed (year)<\u002Fdiv><div class=\"v\">${completedYr.length}<\u002Fdiv><div class=\"sub\">${completed.length} all-time<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat\"><div class=\"k\"><i data-lucide=\"file-text\"><\u002Fi> Pages read<\u002Fdiv><div class=\"v\">${pagesYr.toLocaleString()}<\u002Fdiv><div class=\"sub\">this year<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat\"><div class=\"k\"><i data-lucide=\"book-open\"><\u002Fi> In progress<\u002Fdiv><div class=\"v\">${books.filter(b=>b.status==='In Progress').length}<\u002Fdiv><div class=\"sub\">right now<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat\"><div class=\"k\"><i data-lucide=\"heart\"><\u002Fi> Favourite genre<\u002Fdiv><div class=\"v\" style=\"font-size:20px;padding-top:6px\">${favGenre}<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap\">\n      <div class=\"seg\" id=\"rdFilter\">\n        ${['All','In Progress','Completed','Wishlist'].map(f=>`<button data-f=\"${f}\" class=\"${UI.readFilter===f?'on':''}\">${f}<\u002Fbutton>`).join('')}\n      <\u002Fdiv>\n      <button class=\"btn primary\" id=\"rdAdd\"><i data-lucide=\"plus\"><\u002Fi> Add book<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"gcards\" id=\"rdCards\"><\u002Fdiv>\n  `;\n  view.querySelectorAll('#rdStuTabs button').forEach(b=> b.onclick=()=>{ UI.readStudent=b.dataset.s; RENDERERS.reading(view); lucide.createIcons(); });\n  view.querySelectorAll('#rdFilter button').forEach(b=> b.onclick=()=>{ UI.readFilter=b.dataset.f; RENDERERS.reading(view); lucide.createIcons(); });\n  view.querySelector('#rdAdd').onclick=()=>bookModal(null);\n\n  const cardsEl=view.querySelector('#rdCards');\n  const statusBadge={'Completed':'green','In Progress':'amber','Wishlist':'blue','Abandoned':'grey'};\n  cardsEl.innerHTML = filtered.length? filtered.map(b=>`\n    <div class=\"gcard\" data-id=\"${b.id}\" style=\"cursor:pointer\">\n      <div style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:8px\">\n        <span class=\"badge ${statusBadge[b.status]||'grey'}\">${esc(b.status)}<\u002Fspan>\n        <span class=\"stars\">${[1,2,3,4,5].map(n=>`<i data-lucide=\"star\" class=\"${n<=b.rating?'star-on':'star-off'}\"><\u002Fi>`).join('')}<\u002Fspan>\n      <\u002Fdiv>\n      <h4>${esc(b.title)}<\u002Fh4>\n      <div class=\"muted\" style=\"font-size:13px;margin-top:-4px\">${esc(b.author)}<\u002Fdiv>\n      <div style=\"display:flex;gap:7px;flex-wrap:wrap;margin-top:2px\">\n        <span class=\"chip\">${esc(b.genre)}<\u002Fspan>\n        ${b.pages?`<span class=\"chip\" style=\"background:var(--bg)\"><i data-lucide=\"file-text\" style=\"width:12px\"><\u002Fi> ${b.pages}p<\u002Fspan>`:''}\n      <\u002Fdiv>\n      <div class=\"muted\" style=\"font-size:12px;border-top:1px dashed var(--border);padding-top:9px;margin-top:auto\">\n        ${b.status==='Completed'&&b.finished?`Finished ${fmtDate(parseYmd(b.finished),{day:'numeric',month:'short',year:'numeric'})}`:b.started?`Started ${fmtDate(parseYmd(b.started),{day:'numeric',month:'short'})}`:'Not started'} · ${esc(b.assignedBy)}\n      <\u002Fdiv>\n      ${b.notes?`<div style=\"font-size:12.5px;font-style:italic;color:var(--text-muted)\">\"${esc(b.notes)}\"<\u002Fdiv>`:''}\n    <\u002Fdiv>`).join('') : `<div class=\"empty card pad\" style=\"grid-column:1/-1\"><i data-lucide=\"book-marked\"><\u002Fi><h3>No books here yet<\u002Fh3><p>Add a book to ${esc(stu.name.split(' ')[0])}'s reading log.<\u002Fp><\u002Fdiv>`;\n  cardsEl.querySelectorAll('.gcard').forEach(c=> c.onclick=()=>bookModal(c.dataset.id));\n  lucide.createIcons();\n};\n\nfunction bookModal(id){\n  const b = id? Object.assign({},DB.reading.find(x=>x.id===id)) : {id:uid(),student:UI.readStudent,title:'',author:'',genre:'Fiction',status:'In Progress',started:ymd(appToday()),finished:'',pages:0,rating:0,notes:'',assignedBy:'Self-chosen'};\n  let rating=b.rating;\n  openModal(`\n    <div class=\"modal-head\"><h3>${id?'Edit':'Add'} book<\u002Fh3><button class=\"btn icon ghost\" onclick=\"closeModal()\"><i data-lucide=\"x\"><\u002Fi><\u002Fbutton><\u002Fdiv>\n    <div class=\"modal-body\">\n      <div class=\"row\" style=\"gap:14px\"><label class=\"fld\" style=\"flex:2\"><span>Title<\u002Fspan><input class=\"input\" id=\"bkTitle\" value=\"${esc(b.title)}\" /><\u002Flabel>\n      <label class=\"fld\" style=\"flex:1\"><span>Pages<\u002Fspan><input class=\"input\" type=\"number\" id=\"bkPages\" value=\"${b.pages}\" /><\u002Flabel><\u002Fdiv>\n      <label class=\"fld\"><span>Author<\u002Fspan><input class=\"input\" id=\"bkAuthor\" value=\"${esc(b.author)}\" /><\u002Flabel>\n      <div class=\"row\" style=\"gap:14px\">\n        <label class=\"fld\" style=\"flex:1\"><span>Genre<\u002Fspan><select class=\"input\" id=\"bkGenre\">${GENRES.map(g=>`<option ${g===b.genre?'selected':''}>${g}<\u002Foption>`).join('')}<\u002Fselect><\u002Flabel>\n        <label class=\"fld\" style=\"flex:1\"><span>Status<\u002Fspan><select class=\"input\" id=\"bkStatus\">${BOOK_STATUS.map(g=>`<option ${g===b.status?'selected':''}>${g}<\u002Foption>`).join('')}<\u002Fselect><\u002Flabel>\n      <\u002Fdiv>\n      <div class=\"row\" style=\"gap:14px\">\n        <label class=\"fld\" style=\"flex:1\"><span>Date started<\u002Fspan><input class=\"input\" type=\"date\" id=\"bkStart\" value=\"${b.started}\" /><\u002Flabel>\n        <label class=\"fld\" style=\"flex:1\" id=\"bkFinWrap\"><span>Date finished<\u002Fspan><input class=\"input\" type=\"date\" id=\"bkFin\" value=\"${b.finished}\" /><\u002Flabel>\n      <\u002Fdiv>\n      <label class=\"fld\"><span>Assigned by<\u002Fspan><select class=\"input\" id=\"bkAssign\">${ASSIGNED_BY.map(g=>`<option ${g===b.assignedBy?'selected':''}>${g}<\u002Foption>`).join('')}<\u002Fselect><\u002Flabel>\n      <label class=\"fld\"><span>Rating<\u002Fspan><\u002Flabel>\n      <div class=\"stars\" id=\"bkStars\" style=\"margin:-8px 0 14px;font-size:0\">${[1,2,3,4,5].map(n=>`<i data-lucide=\"star\" data-n=\"${n}\" class=\"${n<=rating?'star-on':'star-off'}\" style=\"width:26px;height:26px;cursor:pointer;margin-right:4px\"><\u002Fi>`).join('')}<\u002Fdiv>\n      <label class=\"fld\"><span>Notes / review<\u002Fspan><textarea class=\"input\" id=\"bkNotes\">${esc(b.notes)}<\u002Ftextarea><\u002Flabel>\n    <\u002Fdiv>\n    <div class=\"modal-foot\">\n      ${id?'<button class=\"btn ghost\" id=\"bkDel\" style=\"color:#E05C5C;margin-right:auto\"><i data-lucide=\"trash-2\"><\u002Fi> Delete<\u002Fbutton>':''}\n      <button class=\"btn ghost\" onclick=\"closeModal()\">Cancel<\u002Fbutton><button class=\"btn primary\" id=\"bkSave\">Save book<\u002Fbutton>\n    <\u002Fdiv>\n  `,{wide:true,onOpen:box=>{\n    box.querySelector('#bkStars').onclick=e=>{ const st=e.target.closest('[data-n]'); if(!st)return; rating=+st.dataset.n; box.querySelectorAll('#bkStars [data-n]').forEach(x=>{ x.classList.toggle('star-on',+x.dataset.n<=rating); x.classList.toggle('star-off',+x.dataset.n>rating); }); };\n    if(id) box.querySelector('#bkDel').onclick=()=>{ DB.reading=DB.reading.filter(x=>x.id!==id); save(true); closeModal(); RENDERERS.reading(document.getElementById('view-reading')); lucide.createIcons(); };\n    box.querySelector('#bkSave').onclick=()=>{\n      const title=box.querySelector('#bkTitle').value.trim(); if(!title){ toast('Enter a title','alert-triangle'); return; }\n      const data={ id:b.id, student:b.student, title, author:box.querySelector('#bkAuthor').value.trim(), genre:box.querySelector('#bkGenre').value,\n        status:box.querySelector('#bkStatus').value, started:box.querySelector('#bkStart').value, finished:box.querySelector('#bkFin').value,\n        pages:+box.querySelector('#bkPages').value||0, rating, notes:box.querySelector('#bkNotes').value.trim(), assignedBy:box.querySelector('#bkAssign').value };\n      if(id){ const i=DB.reading.findIndex(x=>x.id===id); DB.reading[i]=data; } else DB.reading.push(data);\n      save(true); closeModal(); RENDERERS.reading(document.getElementById('view-reading')); lucide.createIcons();\n    };\n  }});\n}\n\n/* ============================================================\n   TAB 7 — FIELD TRIPS\n   ============================================================ */\nRENDERERS.trips = function(view){\n  const yr=appToday().getFullYear();\n  const tripsYr=DB.trips.filter(t=>t.date&&t.date.startsWith(yr));\n  const totalHours=DB.trips.filter(t=>t.status==='Completed').reduce((s,t)=>s+(+t.duration||0),0);\n  const subjCount={}; DB.trips.forEach(t=>(t.subjects||[]).forEach(s=>subjCount[s]=(subjCount[s]||0)+1));\n  const topSubj=Object.keys(subjCount).sort((a,b)=>subjCount[b]-subjCount[a])[0]||'—';\n\n  view.innerHTML=`\n    <div class=\"grid\" style=\"grid-template-columns:repeat(auto-fill,minmax(190px,1fr));margin-bottom:22px\">\n      <div class=\"stat\"><div class=\"k\"><i data-lucide=\"map-pin\"><\u002Fi> Trips this year<\u002Fdiv><div class=\"v\">${tripsYr.length}<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat\"><div class=\"k\"><i data-lucide=\"clock\"><\u002Fi> Total hours<\u002Fdiv><div class=\"v\">${totalHours}<small>h<\u002Fsmall><\u002Fdiv><div class=\"sub\">completed trips<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat\"><div class=\"k\"><i data-lucide=\"book\"><\u002Fi> Top subject<\u002Fdiv><div class=\"v\" style=\"font-size:20px;padding-top:6px\">${esc(topSubj)}<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;justify-content:flex-end;margin-bottom:16px\"><button class=\"btn primary\" id=\"tpAdd\"><i data-lucide=\"plus\"><\u002Fi> Log a field trip<\u002Fbutton><\u002Fdiv>\n    <div class=\"gcards\" id=\"tpCards\"><\u002Fdiv>\n  `;\n  view.querySelector('#tpAdd').onclick=()=>tripModal(null);\n  const statusBadge={'Completed':'green','Planned':'blue','Cancelled':'grey'};\n  const sorted=DB.trips.slice().sort((a,b)=>b.date.localeCompare(a.date));\n  view.querySelector('#tpCards').innerHTML = sorted.length? sorted.map(t=>{\n    const kids=(t.students||[]).map(id=>studentById(id)).filter(Boolean);\n    return `<div class=\"gcard\" data-id=\"${t.id}\" style=\"cursor:pointer\">\n      <div style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:8px\">\n        <span class=\"badge ${statusBadge[t.status]||'grey'}\">${esc(t.status)}<\u002Fspan>\n        <span class=\"muted mono\" style=\"font-size:12px\">${fmtDate(parseYmd(t.date),{day:'numeric',month:'short',year:'numeric'})}<\u002Fspan>\n      <\u002Fdiv>\n      <h4>${esc(t.name)}<\u002Fh4>\n      <div class=\"muted\" style=\"font-size:13px;margin-top:-4px;display:flex;align-items:center;gap:5px\"><i data-lucide=\"map-pin\" style=\"width:13px\"><\u002Fi> ${esc(t.location)}${t.duration?` · ${t.duration}h`:''}<\u002Fdiv>\n      <div style=\"display:flex;gap:6px;flex-wrap:wrap\">${(t.subjects||[]).map(s=>`<span class=\"chip\" style=\"background:var(--bg)\">${esc(s)}<\u002Fspan>`).join('')}<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:5px;margin-top:auto;padding-top:9px;border-top:1px dashed var(--border)\">\n        ${kids.map(k=>`<div class=\"savatar\" style=\"width:28px;height:28px;font-size:15px;background:${studentColor(k)}33\" title=\"${esc(k.name)}\">${k.avatar}<\u002Fdiv>`).join('')}\n        ${t.cost?`<span class=\"muted\" style=\"margin-left:auto;font-size:12px\">$${t.cost}/student<\u002Fspan>`:''}\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join('') : `<div class=\"empty card pad\" style=\"grid-column:1/-1\"><i data-lucide=\"map\"><\u002Fi><h3>No trips logged<\u002Fh3><p>Log your first educational excursion.<\u002Fp><\u002Fdiv>`;\n  view.querySelectorAll('#tpCards .gcard').forEach(c=> c.onclick=()=>tripModal(c.dataset.id));\n  lucide.createIcons();\n};\n\nfunction tripModal(id){\n  const t = id? JSON.parse(JSON.stringify(DB.trips.find(x=>x.id===id))) : {id:uid(),name:'',date:ymd(appToday()),location:'',address:'',duration:2,cost:0,students:[],subjects:[],outcomes:'',notes:'',status:'Planned',photos:''};\n  const allSubjects=[...new Set(DB.students.flatMap(s=>s.subjects.map(su=>su.name)))];\n  openModal(`\n    <div class=\"modal-head\"><h3>${id?'Edit':'Log'} field trip<\u002Fh3><button class=\"btn icon ghost\" onclick=\"closeModal()\"><i data-lucide=\"x\"><\u002Fi><\u002Fbutton><\u002Fdiv>\n    <div class=\"modal-body\">\n      <label class=\"fld\"><span>Trip name<\u002Fspan><input class=\"input\" id=\"tpName\" value=\"${esc(t.name)}\" /><\u002Flabel>\n      <div class=\"row\" style=\"gap:14px\"><label class=\"fld\" style=\"flex:1\"><span>Date<\u002Fspan><input class=\"input\" type=\"date\" id=\"tpDate\" value=\"${t.date}\" /><\u002Flabel>\n      <label class=\"fld\" style=\"flex:1\"><span>Status<\u002Fspan><select class=\"input\" id=\"tpStatus\">${TRIP_STATUS.map(s=>`<option ${s===t.status?'selected':''}>${s}<\u002Foption>`).join('')}<\u002Fselect><\u002Flabel><\u002Fdiv>\n      <div class=\"row\" style=\"gap:14px\"><label class=\"fld\" style=\"flex:2\"><span>Location / venue<\u002Fspan><input class=\"input\" id=\"tpLoc\" value=\"${esc(t.location)}\" /><\u002Flabel>\n      <label class=\"fld\" style=\"flex:1\"><span>Duration (h)<\u002Fspan><input class=\"input\" type=\"number\" step=\"0.5\" id=\"tpDur\" value=\"${t.duration}\" /><\u002Flabel><\u002Fdiv>\n      <div class=\"row\" style=\"gap:14px\"><label class=\"fld\" style=\"flex:2\"><span>Address (optional)<\u002Fspan><input class=\"input\" id=\"tpAddr\" value=\"${esc(t.address)}\" /><\u002Flabel>\n      <label class=\"fld\" style=\"flex:1\"><span>Cost / student<\u002Fspan><input class=\"input\" type=\"number\" id=\"tpCost\" value=\"${t.cost}\" /><\u002Flabel><\u002Fdiv>\n      <label class=\"fld\"><span>Students attending<\u002Fspan><\u002Flabel>\n      <div style=\"display:flex;gap:8px;flex-wrap:wrap;margin:-8px 0 14px\" id=\"tpStudents\">\n        ${activeStudents().map(s=>`<button type=\"button\" class=\"btn sm tpStu ${t.students.includes(s.id)?'primary':''}\" data-id=\"${s.id}\">${s.avatar} ${esc(s.name.split(' ')[0])}<\u002Fbutton>`).join('')}\n      <\u002Fdiv>\n      <label class=\"fld\"><span>Subjects supported<\u002Fspan><\u002Flabel>\n      <div style=\"display:flex;gap:8px;flex-wrap:wrap;margin:-8px 0 14px\" id=\"tpSubjects\">\n        ${allSubjects.map(s=>`<button type=\"button\" class=\"btn sm tpSubj ${t.subjects.includes(s)?'primary':''}\" data-s=\"${esc(s)}\">${esc(s)}<\u002Fbutton>`).join('')}\n      <\u002Fdiv>\n      <label class=\"fld\"><span>Learning outcomes<\u002Fspan><textarea class=\"input\" id=\"tpOut\">${esc(t.outcomes)}<\u002Ftextarea><\u002Flabel>\n      <label class=\"fld\"><span>Notes<\u002Fspan><textarea class=\"input\" id=\"tpNotes\">${esc(t.notes)}<\u002Ftextarea><\u002Flabel>\n      <label class=\"fld\"><span>Photos<\u002Fspan><input class=\"input\" id=\"tpPhotos\" value=\"${esc(t.photos)}\" placeholder=\"Add your own photos by renaming this text\" /><\u002Flabel>\n    <\u002Fdiv>\n    <div class=\"modal-foot\">${id?'<button class=\"btn ghost\" id=\"tpDel\" style=\"color:#E05C5C;margin-right:auto\"><i data-lucide=\"trash-2\"><\u002Fi> Delete<\u002Fbutton>':''}\n      <button class=\"btn ghost\" onclick=\"closeModal()\">Cancel<\u002Fbutton><button class=\"btn primary\" id=\"tpSave\">Save trip<\u002Fbutton><\u002Fdiv>\n  `,{wide:true,onOpen:box=>{\n    let students=t.students.slice(), subjects=t.subjects.slice();\n    box.querySelectorAll('.tpStu').forEach(b=> b.onclick=()=>{ const i=students.indexOf(b.dataset.id); if(i>=0)students.splice(i,1); else students.push(b.dataset.id); b.classList.toggle('primary'); });\n    box.querySelectorAll('.tpSubj').forEach(b=> b.onclick=()=>{ const i=subjects.indexOf(b.dataset.s); if(i>=0)subjects.splice(i,1); else subjects.push(b.dataset.s); b.classList.toggle('primary'); });\n    if(id) box.querySelector('#tpDel').onclick=()=>{ DB.trips=DB.trips.filter(x=>x.id!==id); save(true); closeModal(); RENDERERS.trips(document.getElementById('view-trips')); lucide.createIcons(); };\n    box.querySelector('#tpSave').onclick=()=>{\n      const name=box.querySelector('#tpName').value.trim(); if(!name){ toast('Enter a trip name','alert-triangle'); return; }\n      const data={ id:t.id, name, date:box.querySelector('#tpDate').value, status:box.querySelector('#tpStatus').value, location:box.querySelector('#tpLoc').value.trim(),\n        duration:+box.querySelector('#tpDur').value||0, address:box.querySelector('#tpAddr').value.trim(), cost:+box.querySelector('#tpCost').value||0,\n        students, subjects, outcomes:box.querySelector('#tpOut').value.trim(), notes:box.querySelector('#tpNotes').value.trim(), photos:box.querySelector('#tpPhotos').value.trim() };\n      if(id){ const i=DB.trips.findIndex(x=>x.id===id); DB.trips[i]=data; } else DB.trips.push(data);\n      save(true); closeModal(); RENDERERS.trips(document.getElementById('view-trips')); lucide.createIcons();\n    };\n  }});\n}\n\n/* ============================================================\n   TAB 8 — RESOURCES\n   ============================================================ */\nRENDERERS.resources = function(view){\n  if(!UI.resSearch) UI.resSearch='';\n  if(!UI.resSubject) UI.resSubject='all';\n  const allSubjects=[...new Set(DB.students.flatMap(s=>s.subjects.map(su=>su.name)))];\n  const typeIcon={Website:'globe',Book:'book',Video:'play-circle',Supplier:'truck',Printable:'printer',App:'smartphone',Course:'graduation-cap',Other:'box'};\n\n  view.innerHTML=`\n    <div style=\"display:flex;gap:12px;align-items:center;margin-bottom:18px;flex-wrap:wrap\">\n      <div style=\"position:relative;flex:1;min-width:220px\">\n        <i data-lucide=\"search\" style=\"width:17px;position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted)\"><\u002Fi>\n        <input class=\"input\" id=\"resSearch\" placeholder=\"Search resources…\" value=\"${esc(UI.resSearch)}\" style=\"padding-left:36px\" />\n      <\u002Fdiv>\n      <select class=\"input\" id=\"resSubject\" style=\"width:200px\"><option value=\"all\">All subjects<\u002Foption>${allSubjects.map(s=>`<option value=\"${esc(s)}\" ${UI.resSubject===s?'selected':''}>${esc(s)}<\u002Foption>`).join('')}<\u002Fselect>\n      <button class=\"btn primary\" id=\"resAdd\"><i data-lucide=\"plus\"><\u002Fi> Add resource<\u002Fbutton>\n    <\u002Fdiv>\n    <div id=\"resGroups\"><\u002Fdiv>\n  `;\n  const searchEl=view.querySelector('#resSearch');\n  searchEl.oninput=()=>{ UI.resSearch=searchEl.value; renderResGroups(); };\n  view.querySelector('#resSubject').onchange=e=>{ UI.resSubject=e.target.value; renderResGroups(); };\n  view.querySelector('#resAdd').onclick=()=>resourceModal(null);\n\n  function renderResGroups(){\n    let list=DB.resources.slice();\n    const q=UI.resSearch.toLowerCase();\n    if(q) list=list.filter(r=>(r.title+' '+r.notes).toLowerCase().includes(q));\n    if(UI.resSubject!=='all') list=list.filter(r=>(r.subjects||[]).includes(UI.resSubject));\n    const groups={}; list.forEach(r=>{ (groups[r.type]=groups[r.type]||[]).push(r); });\n    const el=view.querySelector('#resGroups');\n    if(!list.length){ el.innerHTML=`<div class=\"empty card pad\"><i data-lucide=\"link-2\"><\u002Fi><h3>No resources found<\u002Fh3><p>Try a different search or add a new one.<\u002Fp><\u002Fdiv>`; lucide.createIcons(); return; }\n    el.innerHTML=Object.keys(groups).map(type=>`\n      <div style=\"margin-bottom:24px\">\n        <div class=\"section-title\"><i data-lucide=\"${typeIcon[type]||'box'}\"><\u002Fi> ${esc(type)} <span class=\"muted\" style=\"font-weight:400\">(${groups[type].length})<\u002Fspan><\u002Fdiv>\n        <div class=\"gcards\">\n          ${groups[type].map(r=>`<div class=\"gcard\" data-id=\"${r.id}\" style=\"cursor:pointer\">\n            <div style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:8px\">\n              <h4 style=\"flex:1\">${esc(r.title)}<\u002Fh4>\n              ${r.fav?'<i data-lucide=\"star\" class=\"star-on\" style=\"width:18px\"><\u002Fi>':''}\n            <\u002Fdiv>\n            ${r.url?`<a href=\"${esc(r.url)}\" target=\"_blank\" rel=\"noopener\" onclick=\"event.stopPropagation()\" style=\"font-size:12.5px;display:flex;align-items:center;gap:5px;word-break:break-all\"><i data-lucide=\"external-link\" style=\"width:13px\"><\u002Fi> ${esc(r.url.replace(/^https?:\\/\\//,''))}<\u002Fa>`:''}\n            <div style=\"display:flex;gap:6px;flex-wrap:wrap\">${(r.subjects||[]).map(s=>`<span class=\"chip\" style=\"background:var(--bg)\">${esc(s)}<\u002Fspan>`).join('')}<\u002Fdiv>\n            ${r.notes?`<div class=\"muted\" style=\"font-size:12.5px\">${esc(r.notes)}<\u002Fdiv>`:''}\n          <\u002Fdiv>`).join('')}\n        <\u002Fdiv>\n      <\u002Fdiv>`).join('');\n    el.querySelectorAll('.gcard').forEach(c=> c.onclick=()=>resourceModal(c.dataset.id));\n    lucide.createIcons();\n  }\n  renderResGroups();\n  lucide.createIcons();\n};\n\nfunction resourceModal(id){\n  const r = id? JSON.parse(JSON.stringify(DB.resources.find(x=>x.id===id))) : {id:uid(),title:'',url:'',type:'Website',subjects:[],students:[],notes:'',fav:false};\n  const allSubjects=[...new Set(DB.students.flatMap(s=>s.subjects.map(su=>su.name)))];\n  openModal(`\n    <div class=\"modal-head\"><h3>${id?'Edit':'Add'} resource<\u002Fh3><button class=\"btn icon ghost\" onclick=\"closeModal()\"><i data-lucide=\"x\"><\u002Fi><\u002Fbutton><\u002Fdiv>\n    <div class=\"modal-body\">\n      <label class=\"fld\"><span>Title<\u002Fspan><input class=\"input\" id=\"rsTitle\" value=\"${esc(r.title)}\" /><\u002Flabel>\n      <label class=\"fld\"><span>URL<\u002Fspan><input class=\"input\" id=\"rsUrl\" value=\"${esc(r.url)}\" placeholder=\"https://…\" /><\u002Flabel>\n      <label class=\"fld\"><span>Type<\u002Fspan><select class=\"input\" id=\"rsType\">${RES_TYPES.map(t=>`<option ${t===r.type?'selected':''}>${t}<\u002Foption>`).join('')}<\u002Fselect><\u002Flabel>\n      <label class=\"fld\"><span>Subjects<\u002Fspan><\u002Flabel>\n      <div style=\"display:flex;gap:8px;flex-wrap:wrap;margin:-8px 0 14px\" id=\"rsSubjects\">\n        ${allSubjects.map(s=>`<button type=\"button\" class=\"btn sm rsSubj ${r.subjects.includes(s)?'primary':''}\" data-s=\"${esc(s)}\">${esc(s)}<\u002Fbutton>`).join('')}\n      <\u002Fdiv>\n      <label class=\"fld\"><span>Applies to students<\u002Fspan><\u002Flabel>\n      <div style=\"display:flex;gap:8px;flex-wrap:wrap;margin:-8px 0 14px\" id=\"rsStudents\">\n        ${activeStudents().map(s=>`<button type=\"button\" class=\"btn sm rsStu ${r.students.includes(s.id)?'primary':''}\" data-id=\"${s.id}\">${s.avatar} ${esc(s.name.split(' ')[0])}<\u002Fbutton>`).join('')}\n      <\u002Fdiv>\n      <label class=\"fld\"><span>Notes<\u002Fspan><textarea class=\"input\" id=\"rsNotes\">${esc(r.notes)}<\u002Ftextarea><\u002Flabel>\n      <label style=\"display:flex;align-items:center;gap:10px;cursor:pointer;font-weight:600;font-size:14px\"><input type=\"checkbox\" id=\"rsFav\" ${r.fav?'checked':''} style=\"width:18px;height:18px;accent-color:var(--primary)\" /> Mark as favourite ⭐<\u002Flabel>\n    <\u002Fdiv>\n    <div class=\"modal-foot\">${id?'<button class=\"btn ghost\" id=\"rsDel\" style=\"color:#E05C5C;margin-right:auto\"><i data-lucide=\"trash-2\"><\u002Fi> Delete<\u002Fbutton>':''}\n      <button class=\"btn ghost\" onclick=\"closeModal()\">Cancel<\u002Fbutton><button class=\"btn primary\" id=\"rsSave\">Save<\u002Fbutton><\u002Fdiv>\n  `,{wide:true,onOpen:box=>{\n    let subjects=r.subjects.slice(), students=r.students.slice();\n    box.querySelectorAll('.rsSubj').forEach(b=> b.onclick=()=>{ const i=subjects.indexOf(b.dataset.s); if(i>=0)subjects.splice(i,1); else subjects.push(b.dataset.s); b.classList.toggle('primary'); });\n    box.querySelectorAll('.rsStu').forEach(b=> b.onclick=()=>{ const i=students.indexOf(b.dataset.id); if(i>=0)students.splice(i,1); else students.push(b.dataset.id); b.classList.toggle('primary'); });\n    if(id) box.querySelector('#rsDel').onclick=()=>{ DB.resources=DB.resources.filter(x=>x.id!==id); save(true); closeModal(); RENDERERS.resources(document.getElementById('view-resources')); lucide.createIcons(); };\n    box.querySelector('#rsSave').onclick=()=>{\n      const title=box.querySelector('#rsTitle').value.trim(); if(!title){ toast('Enter a title','alert-triangle'); return; }\n      const data={ id:r.id, title, url:box.querySelector('#rsUrl').value.trim(), type:box.querySelector('#rsType').value, subjects, students, notes:box.querySelector('#rsNotes').value.trim(), fav:box.querySelector('#rsFav').checked };\n      if(id){ const i=DB.resources.findIndex(x=>x.id===id); DB.resources[i]=data; } else DB.resources.push(data);\n      save(true); closeModal(); RENDERERS.resources(document.getElementById('view-resources')); lucide.createIcons();\n    };\n  }});\n}\n\n/* ============================================================\n   TAB 9 — YEARLY PLANNER (Scope & Sequence)\n   ============================================================ */\nconst YEAR_STATUS={planned:{label:'Planned',bg:'var(--bg)',color:'var(--text-muted)'},progress:{label:'In progress',bg:'rgba(232,168,56,.2)',color:'#a9750f'},complete:{label:'Complete',bg:'rgba(92,171,125,.2)',color:'#3c8159'}};\nRENDERERS.yearly = function(view){\n  const students=activeStudents();\n  if(!students.length){ view.innerHTML=`<div class=\"empty card pad\"><i data-lucide=\"calendar-days\"><\u002Fi><h3>No active students<\u002Fh3><\u002Fdiv>`; lucide.createIcons(); return; }\n  if(!UI.yearStudent || !students.find(s=>s.id===UI.yearStudent)) UI.yearStudent=students[0].id;\n  const stu=studentById(UI.yearStudent);\n  if(!DB.yearly[stu.id]) DB.yearly[stu.id]={};\n\n  view.innerHTML=`\n    <div style=\"display:flex;justify-content:space-between;align-items:flex-end;gap:14px;margin-bottom:20px;flex-wrap:wrap\">\n      <label class=\"fld\" style=\"margin:0;min-width:240px\"><span>Student<\u002Fspan>\n        <select class=\"input\" id=\"ypStu\">${students.map(s=>`<option value=\"${s.id}\" ${s.id===UI.yearStudent?'selected':''}>${esc(s.name)}<\u002Foption>`).join('')}<\u002Fselect><\u002Flabel>\n      <div style=\"display:flex;gap:14px;align-items:center;font-size:12.5px\">\n        ${Object.keys(YEAR_STATUS).map(k=>`<span style=\"display:flex;align-items:center;gap:6px\"><span style=\"width:16px;height:16px;border-radius:5px;background:${YEAR_STATUS[k].bg};border:1px solid var(--border)\"><\u002Fspan>${YEAR_STATUS[k].label}<\u002Fspan>`).join('')}\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"yeargrid\" id=\"ypGrid\" style=\"grid-template-columns:150px repeat(4,1fr)\"><\u002Fdiv>\n    <p class=\"muted\" style=\"font-size:12.5px;margin-top:14px\"><i data-lucide=\"info\" style=\"width:13px;vertical-align:-2px\"><\u002Fi> Click any cell to add a unit and set its status. This is your scope & sequence overview for the year.<\u002Fp>\n  `;\n  view.querySelector('#ypStu').onchange=e=>{ UI.yearStudent=e.target.value; RENDERERS.yearly(view); lucide.createIcons(); };\n\n  const terms=DB.settings.terms;\n  const grid=view.querySelector('#ypGrid');\n  grid.innerHTML = `<div class=\"yh\">Subject<\u002Fdiv>${terms.map(t=>`<div class=\"yh\" style=\"text-align:center\">Quarter ${t.n}<div class=\"muted\" style=\"font-weight:400;font-size:11px\">${fmtDate(parseYmd(t.start),{day:'numeric',month:'short'})}–${fmtDate(parseYmd(t.end),{day:'numeric',month:'short'})}<\u002Fdiv><\u002Fdiv>`).join('')}`\n    + stu.subjects.map(su=>{\n      const row=DB.yearly[stu.id][su.name]||{};\n      return `<div class=\"yh\" style=\"display:flex;align-items:center;gap:8px\"><span class=\"dot\" style=\"background:${su.color}\"><\u002Fspan>${esc(su.name)}<\u002Fdiv>`\n        + terms.map(t=>{ const cell=row[t.n]; const st=cell?YEAR_STATUS[cell.status]:null;\n          return `<div class=\"yc\" data-subj=\"${esc(su.name)}\" data-term=\"${t.n}\">${cell?`<div class=\"unit\" style=\"background:${st.bg};color:${st.color}\">${esc(cell.unit)}<\u002Fdiv>`:`<div style=\"color:var(--border);display:grid;place-items:center;height:100%\"><i data-lucide=\"plus\" style=\"width:16px\"><\u002Fi><\u002Fdiv>`}<\u002Fdiv>`;\n        }).join('');\n    }).join('');\n  grid.querySelectorAll('.yc').forEach(c=> c.onclick=()=> yearCellModal(stu,c.dataset.subj,+c.dataset.term));\n  lucide.createIcons();\n};\n\nfunction yearCellModal(stu,subjName,term){\n  if(!DB.yearly[stu.id][subjName]) DB.yearly[stu.id][subjName]={};\n  const cell=DB.yearly[stu.id][subjName][term]||{unit:'',status:'planned'};\n  openModal(`\n    <div class=\"modal-head\"><div><h3>${esc(subjName)} — Quarter ${term}<\u002Fh3><div class=\"muted\" style=\"font-size:12.5px\">${esc(stu.name)}<\u002Fdiv><\u002Fdiv><button class=\"btn icon ghost\" onclick=\"closeModal()\"><i data-lucide=\"x\"><\u002Fi><\u002Fbutton><\u002Fdiv>\n    <div class=\"modal-body\">\n      <label class=\"fld\"><span>Unit / topic<\u002Fspan><input class=\"input\" id=\"ycUnit\" value=\"${esc(cell.unit)}\" placeholder=\"e.g. Ancient Egypt\" /><\u002Flabel>\n      <label class=\"fld\"><span>Status<\u002Fspan><select class=\"input\" id=\"ycStatus\">${Object.keys(YEAR_STATUS).map(k=>`<option value=\"${k}\" ${k===cell.status?'selected':''}>${YEAR_STATUS[k].label}<\u002Foption>`).join('')}<\u002Fselect><\u002Flabel>\n    <\u002Fdiv>\n    <div class=\"modal-foot\">\n      <button class=\"btn ghost\" id=\"ycClear\" style=\"color:#E05C5C;margin-right:auto\">Clear<\u002Fbutton>\n      <button class=\"btn ghost\" onclick=\"closeModal()\">Cancel<\u002Fbutton><button class=\"btn primary\" id=\"ycSave\">Save<\u002Fbutton>\n    <\u002Fdiv>\n  `,{onOpen:box=>{\n    box.querySelector('#ycClear').onclick=()=>{ delete DB.yearly[stu.id][subjName][term]; save(true); closeModal(); RENDERERS.yearly(document.getElementById('view-yearly')); lucide.createIcons(); };\n    box.querySelector('#ycSave').onclick=()=>{ const unit=box.querySelector('#ycUnit').value.trim();\n      if(!unit){ delete DB.yearly[stu.id][subjName][term]; } else DB.yearly[stu.id][subjName][term]={unit,status:box.querySelector('#ycStatus').value};\n      save(true); closeModal(); RENDERERS.yearly(document.getElementById('view-yearly')); lucide.createIcons(); };\n  }});\n}\n\n/* ============================================================\n   TAB 10 — REPORTS\n   ============================================================ */\nRENDERERS.reports = function(view){\n  const students=activeStudents();\n  if(!UI.reportType) UI.reportType='transcript';\n  if(!UI.reportStudent) UI.reportStudent=students[0]?students[0].id:null;\n  view.innerHTML=`\n    <div class=\"pagehead no-print\"><div><div class=\"lead\">Generate clean, printable records for legal compliance and progress reporting. Choose a report, preview it, then print or save as PDF from your browser.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"row\" style=\"gap:20px;align-items:flex-start;flex-wrap:wrap\">\n      <div class=\"card pad no-print\" style=\"width:280px;flex-shrink:0\">\n        <div class=\"section-title\"><i data-lucide=\"file-text\"><\u002Fi> Report type<\u002Fdiv>\n        ${[['transcript','Annual Transcript','graduation-cap','Subjects, grades, attendance & achievements'],['attendance','Attendance Report','calendar-check','Day-by-day record with rate %'],['progress','Progress Summary','trending-up','GPA, reading & field trips']].map(([k,label,icon,desc])=>`\n          <button class=\"report-pick\" data-t=\"${k}\" style=\"display:flex;gap:11px;width:100%;text-align:left;padding:12px;border-radius:10px;margin-bottom:8px;border:1px solid ${UI.reportType===k?'var(--primary)':'var(--border)'};background:${UI.reportType===k?'var(--primary-soft)':'transparent'}\">\n            <i data-lucide=\"${icon}\" style=\"width:20px;flex-shrink:0;margin-top:2px;color:var(--primary)\"><\u002Fi>\n            <span><b style=\"font-size:13.5px\">${label}<\u002Fb><br><span class=\"muted\" style=\"font-size:11.5px\">${desc}<\u002Fspan><\u002Fspan>\n          <\u002Fbutton>`).join('')}\n        <div class=\"divider\"><\u002Fdiv>\n        <label class=\"fld\"><span>Student<\u002Fspan><select class=\"input\" id=\"rpStudent\">\n          ${UI.reportType==='attendance'?`<option value=\"all\">All students<\u002Foption>`:''}\n          ${students.map(s=>`<option value=\"${s.id}\" ${s.id===UI.reportStudent?'selected':''}>${esc(s.name)}<\u002Foption>`).join('')}\n        <\u002Fselect><\u002Flabel>\n        <button class=\"btn primary\" id=\"rpPrint\" style=\"width:100%;justify-content:center\"><i data-lucide=\"printer\"><\u002Fi> Print / Save as PDF<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"flex:1;min-width:340px\">\n        <div class=\"card pad report-doc\" id=\"rpPreview\" style=\"background:#fff;color:#2D3142\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  `;\n  view.querySelectorAll('.report-pick').forEach(b=> b.onclick=()=>{ UI.reportType=b.dataset.t; RENDERERS.reports(view); lucide.createIcons(); });\n  view.querySelector('#rpStudent').onchange=e=>{ UI.reportStudent=e.target.value; renderReportPreview(view); };\n  view.querySelector('#rpPrint').onclick=()=>window.print();\n  renderReportPreview(view);\n  lucide.createIcons();\n};\n\nfunction reportHeader(title,sub){\n  return `<div class=\"report-head\" style=\"text-align:center;border-bottom:2px solid #2D3142;padding-bottom:16px;margin-bottom:22px\">\n    <div style=\"font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#7B7D91;margin-bottom:6px\">${esc(DB.settings.familyName)}<\u002Fdiv>\n    <h2 style=\"font-size:24px;color:#2D3142\">${title}<\u002Fh2>\n    <div style=\"color:#7B7D91;font-size:13px;margin-top:4px\">${sub}<\u002Fdiv>\n  <\u002Fdiv>`;\n}\nfunction reportFooter(){\n  return `<div style=\"margin-top:30px;padding-top:14px;border-top:1px solid #E8E4DE;display:flex;justify-content:space-between;font-size:11px;color:#7B7D91\">\n    <span>Generated ${fmtLong(new Date())}<\u002Fspan><span>Personal Use Only — Homeschool Dashboard Pro<\u002Fspan><\u002Fdiv>`;\n}\n\nfunction renderReportPreview(view){\n  const el=view.querySelector('#rpPreview');\n  const yr=appToday().getFullYear();\n  if(UI.reportType==='transcript'){\n    const stu=studentById(UI.reportStudent); if(!stu){ el.innerHTML='<p>Select a student.<\u002Fp>'; return; }\n    const term=DB.settings.terms.find(t=>t.n===DB.settings.currentTerm);\n    const att=attendanceStats(stu.id, DB.settings.yearStart, ymd(appToday()));\n    el.innerHTML = reportHeader('Annual Academic Transcript', `${esc(stu.name)} · ${esc(stu.grade)} · School Year ${yr}`) + `\n      <table style=\"width:100%;border-collapse:collapse;font-size:13px;margin-bottom:22px\">\n        <thead><tr style=\"border-bottom:1px solid #E8E4DE\"><th style=\"text-align:left;padding:9px;color:#7B7D91;font-size:11px;text-transform:uppercase\">Subject<\u002Fth><th style=\"text-align:center;padding:9px;color:#7B7D91;font-size:11px;text-transform:uppercase\">Assessments<\u002Fth><th style=\"text-align:center;padding:9px;color:#7B7D91;font-size:11px;text-transform:uppercase\">Average<\u002Fth><th style=\"text-align:center;padding:9px;color:#7B7D91;font-size:11px;text-transform:uppercase\">Grade<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>${stu.subjects.map(su=>{ const avg=subjectAverage(stu.id,su.id); const list=(DB.grades[stu.id]&&DB.grades[stu.id][su.id])||[]; const gl=avg!=null?gradeLetterFor(avg):null;\n          return `<tr style=\"border-bottom:1px solid #f0ede8\"><td style=\"padding:10px 9px;font-weight:600\">${esc(su.name)}<\u002Ftd><td style=\"text-align:center;padding:10px 9px\">${list.length}<\u002Ftd><td style=\"text-align:center;padding:10px 9px;font-family:'JetBrains Mono'\">${avg!=null?avg+'%':'—'}<\u002Ftd><td style=\"text-align:center;padding:10px 9px;font-weight:700\">${gl?gl.g:'—'}<\u002Ftd><\u002Ftr>`;\n        }).join('')}<\u002Ftbody>\n      <\u002Ftable>\n      <div style=\"display:flex;gap:30px;margin-bottom:22px;flex-wrap:wrap\">\n        <div><div style=\"font-size:11px;text-transform:uppercase;color:#7B7D91\">Weighted GPA<\u002Fdiv><div style=\"font-family:'JetBrains Mono';font-size:26px;font-weight:700\">${studentGPA(stu.id)!=null?studentGPA(stu.id).toFixed(2):'—'} <span style=\"font-size:14px;color:#7B7D91\">/ 4.0<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-size:11px;text-transform:uppercase;color:#7B7D91\">Attendance Rate<\u002Fdiv><div style=\"font-family:'JetBrains Mono';font-size:26px;font-weight:700\">${att.rate}%<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-size:11px;text-transform:uppercase;color:#7B7D91\">School Days<\u002Fdiv><div style=\"font-family:'JetBrains Mono';font-size:26px;font-weight:700\">${att.total}<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-bottom:24px\"><div style=\"font-size:11px;text-transform:uppercase;color:#7B7D91;margin-bottom:6px\">Notable Achievements<\u002Fdiv>\n        <div contenteditable=\"true\" style=\"min-height:60px;border:1px dashed #E8E4DE;border-radius:8px;padding:12px;font-size:13px;color:#2D3142\" id=\"rpAchieve\"><\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex;gap:40px;margin-top:34px\">\n        <div style=\"flex:1;border-top:1px solid #2D3142;padding-top:6px;font-size:12px;color:#7B7D91\">Parent / Educator signature<\u002Fdiv>\n        <div style=\"flex:1;border-top:1px solid #2D3142;padding-top:6px;font-size:12px;color:#7B7D91\">Date<\u002Fdiv>\n      <\u002Fdiv>` + reportFooter();\n  }\n  else if(UI.reportType==='attendance'){\n    const targets = UI.reportStudent==='all'? activeStudents() : [studentById(UI.reportStudent)].filter(Boolean);\n    el.innerHTML = reportHeader('Attendance Record', `School Year ${yr} · ${esc(DB.settings.familyName)}`) +\n      targets.map(stu=>{ const att=attendanceStats(stu.id, DB.settings.yearStart, ymd(appToday()));\n        return `<div class=\"report-page\" style=\"margin-bottom:26px\">\n          <h3 style=\"font-size:17px;margin-bottom:4px\">${esc(stu.name)} <span style=\"font-weight:400;color:#7B7D91;font-size:13px\">· ${esc(stu.grade)}<\u002Fspan><\u002Fh3>\n          <div style=\"display:flex;gap:24px;margin:12px 0 16px;flex-wrap:wrap\">\n            ${[['Rate',att.rate+'%'],['Present',att.present],['Absent',att.absent],['Excused',att.excused],['Total days',att.total]].map(([k,v])=>`<div><div style=\"font-size:10.5px;text-transform:uppercase;color:#7B7D91\">${k}<\u002Fdiv><div style=\"font-family:'JetBrains Mono';font-size:22px;font-weight:700\">${v}<\u002Fdiv><\u002Fdiv>`).join('')}\n          <\u002Fdiv>\n          <div style=\"font-size:12px;color:#7B7D91\">Quarter dates: ${DB.settings.terms.map(t=>`Q${t.n} ${fmtDate(parseYmd(t.start),{day:'numeric',month:'short'})}–${fmtDate(parseYmd(t.end),{day:'numeric',month:'short'})}`).join(' · ')}<\u002Fdiv>\n        <\u002Fdiv>`;\n      }).join('') + reportFooter();\n  }\n  else {\n    const stu=studentById(UI.reportStudent); if(!stu){ el.innerHTML='<p>Select a student.<\u002Fp>'; return; }\n    const books=DB.reading.filter(b=>b.student===stu.id&&b.status==='Completed');\n    const trips=DB.trips.filter(t=>t.status==='Completed'&&(t.students||[]).includes(stu.id));\n    el.innerHTML = reportHeader('Progress Summary', `${esc(stu.name)} · ${esc(stu.grade)} · ${yr}`) + `\n      <div style=\"margin-bottom:24px\"><div style=\"font-size:11px;text-transform:uppercase;color:#7B7D91;margin-bottom:10px\">Subject Performance<\u002Fdiv>\n        ${stu.subjects.map(su=>{ const avg=subjectAverage(stu.id,su.id); return `<div style=\"display:flex;align-items:center;gap:12px;margin-bottom:8px\"><span style=\"width:120px;font-weight:600;font-size:13px\">${esc(su.name)}<\u002Fspan><div style=\"flex:1;height:12px;background:#f0ede8;border-radius:6px;overflow:hidden\"><div style=\"height:100%;width:${avg||0}%;background:${su.color}\"><\u002Fdiv><\u002Fdiv><span style=\"font-family:'JetBrains Mono';font-size:13px;width:48px;text-align:right\">${avg!=null?avg+'%':'—'}<\u002Fspan><\u002Fdiv>`; }).join('')}\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:30px;margin-bottom:22px\">\n        <div><div style=\"font-size:11px;text-transform:uppercase;color:#7B7D91\">Books completed<\u002Fdiv><div style=\"font-family:'JetBrains Mono';font-size:26px;font-weight:700\">${books.length}<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-size:11px;text-transform:uppercase;color:#7B7D91\">Field trips<\u002Fdiv><div style=\"font-family:'JetBrains Mono';font-size:26px;font-weight:700\">${trips.length}<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-size:11px;text-transform:uppercase;color:#7B7D91\">Pages read<\u002Fdiv><div style=\"font-family:'JetBrains Mono';font-size:26px;font-weight:700\">${books.reduce((s,b)=>s+(b.pages||0),0).toLocaleString()}<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-bottom:18px\"><div style=\"font-size:11px;text-transform:uppercase;color:#7B7D91;margin-bottom:6px\">Educator notes<\u002Fdiv>\n        <div contenteditable=\"true\" style=\"min-height:70px;border:1px dashed #E8E4DE;border-radius:8px;padding:12px;font-size:13px\" id=\"rpNotes\"><\u002Fdiv><\u002Fdiv>\n      ` + reportFooter();\n  }\n}\n\n/* ============================================================\n   TAB 11 — SETTINGS\n   ============================================================ */\nconst THEMES=[\n  {id:'meadow',name:'Meadow Pastels',sw:['#7EC8A4','#C9B8D8','#F7C59F','#F9E784'],desc:'Child-friendly & warm'},\n  {id:'ocean',name:'Ocean Calm',sw:['#6BAED6','#A8D5BA','#F4E4C1','#B5D5E8'],desc:'Calm & clean'},\n  {id:'grove',name:'Sunshine Grove',sw:['#E8A838','#7EAA72','#D4785A','#F5EDD6'],desc:'Earthy & bright'},\n  {id:'dark',name:'Dark Mode',sw:['#7EC8A4','#A89EC8','#252840','#1A1C2E'],desc:'Evening planning'},\n];\nRENDERERS.settings = function(view){\n  const s=DB.settings;\n  view.innerHTML=`\n    <div class=\"grid\" style=\"grid-template-columns:repeat(auto-fill,minmax(380px,1fr));align-items:start\">\n\n      <div class=\"card pad\" style=\"grid-column:1/-1\">\n        <div class=\"section-title\"><i data-lucide=\"calendar-days\"><\u002Fi> School Year Setup<\u002Fdiv>\n        <p class=\"muted\" style=\"font-size:12.5px;margin-bottom:14px\">U.S. schools commonly organize the year into two semesters or four quarters. This planner uses four editable quarters.<\u002Fp>\n        <div class=\"grid\" style=\"grid-template-columns:repeat(auto-fit,minmax(220px,1fr))\">\n          <label class=\"fld\"><span>Family / school name<\u002Fspan><input class=\"input\" id=\"stFamily\" value=\"${esc(s.familyName)}\" /><\u002Flabel>\n          <label class=\"fld\"><span>Year start date<\u002Fspan><input class=\"input\" type=\"date\" id=\"stYearStart\" value=\"${s.yearStart}\" /><\u002Flabel>\n          <label class=\"fld\"><span>Current quarter<\u002Fspan><select class=\"input\" id=\"stCurTerm\">${s.terms.map(t=>`<option value=\"${t.n}\" ${t.n===s.currentTerm?'selected':''}>Quarter ${t.n}<\u002Foption>`).join('')}<\u002Fselect><\u002Flabel>\n        <\u002Fdiv>\n        <label class=\"fld\"><span>Grade scale<\u002Fspan><select class=\"input\" id=\"stScale\">${['Australian','US','Custom'].map(g=>`<option ${g===s.gradeScaleName?'selected':''}>${g}<\u002Foption>`).join('')}<\u002Fselect><\u002Flabel>\n        <p class=\"muted\" id=\"stScaleHelp\" style=\"font-size:12.5px;margin-top:-8px;margin-bottom:12px\"><\u002Fp>\n        <div id=\"stCustomScale\"><\u002Fdiv>\n        <div class=\"divider\"><\u002Fdiv>\n        <div style=\"font-size:12.5px;font-weight:600;color:var(--text-muted);margin-bottom:10px\">QUARTER DATES<\u002Fdiv>\n        <div id=\"stTerms\" class=\"grid\" style=\"grid-template-columns:repeat(auto-fit,minmax(310px,1fr))\">${s.terms.map((t,i)=>`<div style=\"display:grid;grid-template-columns:72px minmax(120px,1fr) minmax(120px,1fr);gap:8px;align-items:center\"><span style=\"font-size:13px;font-weight:600;white-space:nowrap\">Quarter ${t.n}<\u002Fspan><input class=\"input stTermStart\" data-i=\"${i}\" type=\"date\" value=\"${t.start}\" /><input class=\"input stTermEnd\" data-i=\"${i}\" type=\"date\" value=\"${t.end}\" /><\u002Fdiv>`).join('')}<\u002Fdiv>\n        <div class=\"divider\"><\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:10px\"><span style=\"font-size:12.5px;font-weight:600;color:var(--text-muted)\">PUBLIC HOLIDAYS<\u002Fspan><button class=\"btn sm ghost\" id=\"stAddHol\"><i data-lucide=\"plus\"><\u002Fi> Add<\u002Fbutton><\u002Fdiv>\n        <div id=\"stHolidays\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"card pad\">\n        <div class=\"section-title\"><i data-lucide=\"palette\"><\u002Fi> Theme & Display<\u002Fdiv>\n        <div class=\"grid\" style=\"grid-template-columns:1fr 1fr;margin-bottom:18px\" id=\"stThemes\">\n          ${THEMES.map(t=>`<div class=\"theme-card ${s.theme===t.id?'on':''}\" data-t=\"${t.id}\">\n            <div class=\"theme-swatches\">${t.sw.map(c=>`<span style=\"background:${c}\"><\u002Fspan>`).join('')}<\u002Fdiv>\n            <div style=\"font-weight:600;font-size:13.5px\">${t.name}<\u002Fdiv><div class=\"muted\" style=\"font-size:11.5px\">${t.desc}<\u002Fdiv>\n          <\u002Fdiv>`).join('')}\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"card pad\">\n        <div class=\"section-title\"><i data-lucide=\"database\"><\u002Fi> Data Management<\u002Fdiv>\n        <p class=\"muted\" style=\"font-size:12.5px;margin-bottom:14px\">All your data lives only on this device, in this browser. Back it up regularly — clearing your browser data will erase it.<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:9px\">\n          <button class=\"btn\" id=\"stExportJson\"><i data-lucide=\"download\"><\u002Fi> Export all data (JSON backup)<\u002Fbutton>\n          <button class=\"btn\" id=\"stImportJson\"><i data-lucide=\"upload\"><\u002Fi> Import data (JSON)<\u002Fbutton>\n          <button class=\"btn\" id=\"stExportCsv\"><i data-lucide=\"table\"><\u002Fi> Export as CSV (per data type)<\u002Fbutton>\n          <button class=\"btn\" id=\"stLoadDemo\"><i data-lucide=\"sparkles\"><\u002Fi> Load demo data (Henderson family)<\u002Fbutton>\n          <button class=\"btn danger\" id=\"stClear\"><i data-lucide=\"trash-2\"><\u002Fi> Clear all data<\u002Fbutton>\n        <\u002Fdiv>\n        <input type=\"file\" id=\"stFileInput\" accept=\"application/json\" style=\"display:none\" />\n      <\u002Fdiv>\n\n      <div class=\"card pad\">\n        <div class=\"section-title\"><i data-lucide=\"info\"><\u002Fi> About<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px;font-size:13.5px\">\n          <div style=\"display:flex;justify-content:space-between\"><span class=\"muted\">Version<\u002Fspan><span class=\"mono\">${esc(DB.version||'1.0.0')}<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between\"><span class=\"muted\">Storage used<\u002Fspan><span class=\"mono\" id=\"stStorage\">—<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between\"><span class=\"muted\">Etsy shop<\u002Fspan><a href=\"#\" onclick=\"return false\">LifePlanned Store<\u002Fa><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"divider\"><\u002Fdiv>\n        <p class=\"muted\" style=\"font-size:12px;line-height:1.6\">Licensed for single-household personal use only. Your planning data is stored only on your own device and is never transmitted anywhere.<\u002Fp>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  `;\n  // School year\n  const bindSave = (id,fn)=>{ const el=view.querySelector(id); el.onchange=()=>{ fn(el.value); save(true); }; };\n  bindSave('#stFamily', v=>{ s.familyName=v; document.getElementById('footFamily').textContent=v; });\n  bindSave('#stYearStart', v=>{ s.yearStart=v; });\n  bindSave('#stCurTerm', v=>{ s.currentTerm=+v; updateTermChip(); });\n  const scaleHelp=view.querySelector('#stScaleHelp'), customScale=view.querySelector('#stCustomScale');\n  function renderScale(){\n    const name=view.querySelector('#stScale').value;\n    scaleHelp.textContent=name==='US'\n      ? 'U.S. scale: A 90–100, B 80–89, C 70–79, D 60–69, F below 60. This controls grade letters and GPA.'\n      : name==='Australian'\n        ? 'Australian scale: A 85–100, B 70–84, C 55–69, D 40–54, F below 40. This controls grade letters and GPA.'\n        : 'Custom lets you set the minimum percentage for each letter grade; those thresholds control grade letters and GPA.';\n    customScale.innerHTML=name==='Custom'?`<div class=\"grid\" style=\"grid-template-columns:repeat(auto-fit,minmax(110px,1fr));margin-bottom:14px\">${s.customGradeScale.map((g,i)=>`<label class=\"fld\"><span>${g.g} minimum %<\u002Fspan><input class=\"input customMin\" type=\"number\" min=\"0\" max=\"100\" data-i=\"${i}\" value=\"${g.min}\" /><\u002Flabel>`).join('')}<\u002Fdiv>`:'';\n    customScale.querySelectorAll('.customMin').forEach(inp=>inp.onchange=()=>{ s.customGradeScale[+inp.dataset.i].min=Math.max(0,Math.min(100,+inp.value||0)); save(true); });\n  }\n  view.querySelector('#stScale').onchange=e=>{ s.gradeScaleName=e.target.value; save(true); renderScale(); };\n  renderScale();\n  view.querySelectorAll('.stTermStart').forEach(inp=> inp.onchange=()=>{ s.terms[+inp.dataset.i].start=inp.value; save(true); });\n  view.querySelectorAll('.stTermEnd').forEach(inp=> inp.onchange=()=>{ s.terms[+inp.dataset.i].end=inp.value; save(true); });\n\n  function renderHolidays(){\n    const el=view.querySelector('#stHolidays');\n    el.innerHTML=(s.holidays||[]).map((h,i)=>`<div style=\"display:flex;gap:8px;align-items:center;margin-bottom:8px\"><input class=\"input holLabel\" data-i=\"${i}\" value=\"${esc(h.label)}\" placeholder=\"Holiday name\" /><input class=\"input holDate\" data-i=\"${i}\" type=\"date\" value=\"${h.date}\" style=\"width:160px\" /><button class=\"btn icon ghost holDel\" data-i=\"${i}\" style=\"color:#E05C5C\"><i data-lucide=\"x\"><\u002Fi><\u002Fbutton><\u002Fdiv>`).join('')||'<p class=\"muted\" style=\"font-size:12.5px\">No holidays added.<\u002Fp>';\n    lucide.createIcons();\n    el.querySelectorAll('.holLabel').forEach(x=> x.onchange=()=>{ s.holidays[+x.dataset.i].label=x.value; save(true); });\n    el.querySelectorAll('.holDate').forEach(x=> x.onchange=()=>{ s.holidays[+x.dataset.i].date=x.value; save(true); });\n    el.querySelectorAll('.holDel').forEach(b=> b.onclick=()=>{ s.holidays.splice(+b.dataset.i,1); save(true); renderHolidays(); });\n  }\n  renderHolidays();\n  view.querySelector('#stAddHol').onclick=()=>{ (s.holidays=s.holidays||[]).push({label:'',date:ymd(appToday())}); save(); renderHolidays(); };\n\n  // Theme\n  view.querySelectorAll('#stThemes .theme-card').forEach(c=> c.onclick=()=>{ s.theme=c.dataset.t; save(true); applyTheme(); view.querySelectorAll('#stThemes .theme-card').forEach(x=>x.classList.toggle('on',x===c)); });\n  // Data\n  view.querySelector('#stExportJson').onclick=exportJSON;\n  view.querySelector('#stExportCsv').onclick=exportCSV;\n  view.querySelector('#stImportJson').onclick=()=>view.querySelector('#stFileInput').click();\n  view.querySelector('#stFileInput').onchange=e=>{ const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{ try{ const data=JSON.parse(r.result);\n    confirmModal('Import data?','This will <b>overwrite all current data<\u002Fb> with the contents of this file. Consider exporting a backup first.',()=>{ DB=data; save(true); applyTheme(); go('settings'); toast('Data imported','check'); },{yesLabel:'Overwrite & import'});\n  }catch(err){ toast('Invalid JSON file','alert-triangle'); } }; r.readAsText(f); e.target.value=''; };\n  view.querySelector('#stLoadDemo').onclick=()=>confirmModal('Load demo data?','This replaces all current data with the Henderson family demo. Your existing data will be lost.',()=>{ DB=demoData(); save(true); applyTheme(); go('dashboard'); toast('Demo data loaded','sparkles'); },{yesLabel:'Load demo'});\n  view.querySelector('#stClear').onclick=()=>confirmModal('Clear all data?','This permanently erases <b>everything<\u002Fb> — students, lessons, attendance, grades, and reading. This cannot be undone.',()=>{ localStorage.removeItem(STORE_KEY); DB=demoData(); DB.students=[]; DB.reading=[];DB.trips=[];DB.resources=[]; DB.lessons={};DB.attendance={};DB.grades={};DB.yearly={}; DB.settings.familyName='My Family'; save(true); go('dashboard'); toast('All data cleared','trash-2'); },{danger:true,typeToConfirm:'CLEAR',yesLabel:'Clear everything'});\n\n  try{ const bytes=new Blob([localStorage.getItem(STORE_KEY)||'']).size; view.querySelector('#stStorage').textContent=(bytes/1024).toFixed(1)+' KB'; }catch(e){}\n  lucide.createIcons();\n};\n\nfunction downloadFile(name,content,type){\n  const blob=new Blob([content],{type:type||'text/plain'}); const url=URL.createObjectURL(blob);\n  const a=document.createElement('a'); a.href=url; a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(url),1000);\n}\nfunction exportJSON(){ const stamp=ymd(new Date()); downloadFile(`homeschool-backup-${stamp}.json`, JSON.stringify(DB,null,2), 'application/json'); toast('Backup downloaded','download'); }\nfunction csvEscape(v){ v=String(v==null?'':v); return /[\",\\n]/.test(v)?`\"${v.replace(/\"/g,'\"\"')}\"`:v; }\nfunction exportCSV(){\n  let out='';\n  out+='# STUDENTS\\nName,Grade,DOB,Colour,Active,Subjects\\n';\n  DB.students.forEach(s=> out+=[s.name,s.grade,s.dob,s.color,s.active,s.subjects.map(x=>x.name).join('; ')].map(csvEscape).join(',')+'\\n');\n  out+='\\n# GRADES\\nStudent,Subject,Assessment,Date,Score,Max,Weight,Type\\n';\n  DB.students.forEach(s=>{ (s.subjects||[]).forEach(su=>{ ((DB.grades[s.id]&&DB.grades[s.id][su.id])||[]).forEach(a=> out+=[s.name,su.name,a.name,a.date,a.score,a.max,a.weight,a.type].map(csvEscape).join(',')+'\\n'); }); });\n  out+='\\n# ATTENDANCE\\nStudent,Date,Status\\n';\n  Object.keys(DB.attendance).forEach(k=>{ const [sid,date]=k.split('|'); const st=studentById(sid); if(st) out+=[st.name,date,DB.attendance[k]].map(csvEscape).join(',')+'\\n'; });\n  out+='\\n# READING\\nStudent,Title,Author,Genre,Status,Pages,Rating\\n';\n  DB.reading.forEach(b=>{ const st=studentById(b.student); out+=[st?st.name:'',b.title,b.author,b.genre,b.status,b.pages,b.rating].map(csvEscape).join(',')+'\\n'; });\n  out+='\\n# FIELD TRIPS\\nName,Date,Location,Duration,Status,Subjects\\n';\n  DB.trips.forEach(t=> out+=[t.name,t.date,t.location,t.duration,t.status,(t.subjects||[]).join('; ')].map(csvEscape).join(',')+'\\n');\n  downloadFile(`homeschool-data-${ymd(new Date())}.csv`, out, 'text/csv'); toast('CSV exported','table');\n}\n\n/* ============================================================\n   TAB 12 — INSTRUCTIONS\n   ============================================================ */\nRENDERERS.instructions = function(view){\n  const steps=[\n    ['Add your students','Go to Students and add a profile for each child — name, grade level, color, and their subjects.'],\n    ['Set up your school year','In Settings, set your year start date and quarter dates. Weekly views populate automatically from these.'],\n    ['Plan your week','Open Lesson Planner, pick a student, and click any cell in the grid to add a lesson with objectives and materials.'],\n    ['Track as you go','Tick subjects off on the Dashboard each day, mark attendance, and log grades and books as you complete them.'],\n    ['Generate records','When you need a transcript or attendance summary, head to Reports and print or save as PDF.'],\n  ];\n  const faqs=[\n    ['Can I use this on my phone?','Yes. The app is fully responsive — on a phone the sidebar becomes a menu button. Planning is easiest on a laptop; quick attendance and tick-offs work great on a phone.'],\n    ['Does it work offline?','Yes. After the first load, all your data is stored locally and the app works without internet. (An internet connection is only needed the very first time, to load fonts and charts.)'],\n    ['What happens if I clear my browser cache?','Your data is stored in this browser only. Clearing site data or browsing history can erase it. Export a JSON backup from Settings regularly to stay safe.'],\n    ['Can I add more than 5 students?','The app supports up to 5 active student profiles. You can archive a student to free a slot while keeping their data.'],\n    ['Can I print without a printer — save as PDF?','Yes. In any print dialog choose \"Save as PDF\" as the destination. Reports are designed for clean PDF output.'],\n    ['How is the GPA calculated?','Each subject average is weighted by the Weight % you assign to each assessment. Averages map to grade letters (A–F) and a 4.0 GPA scale.'],\n    ['How do I move my data to a new device?','Export a JSON backup on the old device, then use Import data in Settings on the new one.'],\n    ['Is my data private?','Completely. Nothing is ever sent anywhere — all data stays in your browser on your device.'],\n  ];\n  view.innerHTML=`\n    <div class=\"pagehead\"><div><div class=\"lead\">Everything you need to get the most out of Homeschool Dashboard Pro. Work through the getting-started steps, then dip into the FAQ whenever you need it.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n\n    <div class=\"card pad\" style=\"margin-bottom:22px\">\n      <div class=\"section-title\"><i data-lucide=\"rocket\"><\u002Fi> Getting started<\u002Fdiv>\n      ${steps.map((st,i)=>`<div class=\"help-step\"><div class=\"help-num\">${i+1}<\u002Fdiv><div><div style=\"font-weight:600;font-size:15px;font-family:'Fraunces'\">${st[0]}<\u002Fdiv><div class=\"muted\" style=\"font-size:13.5px;margin-top:2px\">${st[1]}<\u002Fdiv><\u002Fdiv><\u002Fdiv>`).join('')}\n    <\u002Fdiv>\n\n    <div class=\"grid\" style=\"grid-template-columns:repeat(auto-fill,minmax(300px,1fr));margin-bottom:22px\">\n      ${[['Planning your week','book-open','Use the Lesson Planner grid or list view. Each lesson stores objectives, materials, method, assessment type, and a completion status that syncs to your Dashboard.'],\n         ['Tracking attendance','calendar-check','Click a cell to cycle Present → Absent → Excused → Sick → Holiday. Rates calculate automatically; a banner warns you if a child drops below 85%.'],\n         ['Grades & GPA','graduation-cap','Add assessments with a score, max, and weight. The app computes weighted subject averages, grade letters, and an overall GPA out of 4.0.'],\n         ['Generating reports','file-text','Three report types — Annual Transcript, Attendance Record, and Progress Summary — all print-ready with a clean signature line for compliance.'],\n         ['Backing up your data','database','Export a JSON backup from Settings any time. To move devices, export on one and import on the other. CSV export is great for spreadsheets.']\n        ].map(c=>`<div class=\"card pad\"><div class=\"section-title\"><i data-lucide=\"${c[1]}\"><\u002Fi> ${c[0]}<\u002Fdiv><p class=\"muted\" style=\"font-size:13.5px;line-height:1.6\">${c[2]}<\u002Fp><\u002Fdiv>`).join('')}\n    <\u002Fdiv>\n\n    <div class=\"card pad\" style=\"margin-bottom:22px\">\n      <div class=\"section-title\"><i data-lucide=\"help-circle\"><\u002Fi> Frequently asked questions<\u002Fdiv>\n      ${faqs.map(f=>`<details class=\"faq\"><summary>${f[0]}<i data-lucide=\"chevron-down\" style=\"width:17px\"><\u002Fi><\u002Fsummary><div class=\"faq-body\">${f[1]}<\u002Fdiv><\u002Fdetails>`).join('')}\n    <\u002Fdiv>\n\n    <details class=\"faq\" style=\"border-color:var(--primary)\">\n      <summary><span style=\"display:flex;align-items:center;gap:8px\"><i data-lucide=\"shield-check\" style=\"width:17px;color:var(--primary)\"><\u002Fi> Security & Privacy<\u002Fspan><i data-lucide=\"chevron-down\" style=\"width:17px\"><\u002Fi><\u002Fsummary>\n      <div class=\"faq-body\">This product is licensed for single-household personal use only. Your planning data is stored only on your own device and is never transmitted anywhere. Treat your access code like a password — do not share it.<\u002Fdiv>\n    <\u002Fdetails>\n  `;\n  lucide.createIcons();\n};\n\n/* MODULES_INSERTION_POINT */\n\n/* ============================================================\n   BOOT\n   ============================================================ */\nfunction updateTermChip(){\n  const term=DB.settings.terms.find(t=>t.n===DB.settings.currentTerm);\n  if(term){ const todayStr=ymd(appToday()); const wk=Math.floor(daysBetween(term.start,todayStr)/7)+1;\n    document.querySelector('#termChip span').textContent=`Quarter ${term.n} · Week ${wk>0?wk:1}`; }\n}\nfunction setupAccessGate(){\n  const gate=document.getElementById('accessGate');\n  if(sessionStorage.getItem('hsdpro_unlocked')==='yes'){ gate.classList.add('hidden'); return; }\n  const form=document.getElementById('accessForm'), input=document.getElementById('accessCode'), error=document.getElementById('accessError');\n  form.onsubmit=e=>{\n    e.preventDefault();\n    if(input.value===ACCESS_CODE){\n      sessionStorage.setItem('hsdpro_unlocked','yes');\n      gate.classList.add('hidden');\n      error.textContent='';\n    }else{\n      error.textContent='Incorrect access code.';\n      input.select();\n    }\n  };\n}\nfunction boot(){\n  if(!load()){ DB = demoData(); save(); }\n  // migrate-safe defaults\n  DB.settings = Object.assign({\n    familyName:'My Family',theme:'meadow',gradeScaleName:'US',currentTerm:2,terms:[],holidays:DEFAULT_US_HOLIDAYS.map(h=>({...h})),\n    customGradeScale:[ {g:'A',min:90,gpa:4.0},{g:'B',min:80,gpa:3.0},{g:'C',min:70,gpa:2.0},{g:'D',min:60,gpa:1.0},{g:'F',min:0,gpa:0} ]\n  }, DB.settings||{});\n  if(!DB.settings.customGradeScale) DB.settings.customGradeScale=GRADE_SCALES.US.map(g=>({...g}));\n  if((DB.settings.holidays||[]).some(h=>/ANZAC|King's Birthday/i.test(h.label||''))) DB.settings.holidays=DEFAULT_US_HOLIDAYS.map(h=>({...h}));\n  if(DB.settings.gradeScaleName==='Australian' && DB.version==='1.0.0') DB.settings.gradeScaleName='US';\n  DB.students.forEach(s=>{ if(/^Year \\d+$/.test(s.grade)) s.grade=s.grade.replace('Year ','Grade '); if(s.grade==='Kindy') s.grade='Kindergarten'; });\n  if(DB.version==='1.1.0' && DB.settings.familyName==='The Henderson Family'){\n    DB.students.forEach(stu=>{\n      const dates=[...new Set(Object.keys(DB.lessons||{}).filter(k=>k.startsWith(stu.id+'|')).map(k=>k.split('|')[2]))];\n      dates.forEach(date=>{\n        let minute=9*60;\n        stu.subjects.forEach(su=>{\n          const lesson=DB.lessons[`${stu.id}|${su.id}|${date}`];\n          if(!lesson)return;\n          const duration=Math.max(30,Math.ceil((lesson.duration||30)/30)*30);\n          lesson.startTime=timeFromMinutes(minute); lesson.endTime=timeFromMinutes(minute+duration); lesson.duration=duration;\n          minute+=duration;\n        });\n      });\n    });\n  }\n  Object.values(DB.lessons||{}).forEach(l=>{\n    if(!l.startTime) l.startTime='09:00';\n    if(!l.endTime) l.endTime=timeFromMinutes(9*60+Math.max(30,Math.ceil((l.duration||30)/30)*30));\n    l.duration=(parseInt(l.endTime.slice(0,2))*60+parseInt(l.endTime.slice(3)))-(parseInt(l.startTime.slice(0,2))*60+parseInt(l.startTime.slice(3)));\n  });\n  DB.version='1.2.0';\n  save();\n  buildNav();\n  applyTheme();\n  document.getElementById('footFamily').textContent = DB.settings.familyName;\n  updateTermChip();\n  setupAccessGate();\n  // hamburger\n  document.getElementById('hamburger').onclick=()=>{\n    const sidebar=document.getElementById('sidebar'), mobile=window.matchMedia('(max-width:1023px)').matches;\n    if(mobile){\n      sidebar.classList.toggle('open');\n      document.getElementById('scrim').classList.toggle('show');\n      document.getElementById('hamburger').setAttribute('aria-expanded',sidebar.classList.contains('open'));\n    }else{\n      sidebar.classList.toggle('collapsed');\n      document.getElementById('hamburger').setAttribute('aria-expanded',!sidebar.classList.contains('collapsed'));\n    }\n  };\n  document.getElementById('scrim').onclick=()=>{ document.getElementById('sidebar').classList.remove('open'); document.getElementById('scrim').classList.remove('show'); };\n  go('dashboard');\n  lucide.createIcons();\n  console.log('%c📚 Homeschool Dashboard Pro ready','color:#7EC8A4;font-weight:bold');\n}\nif(document.readyState==='loading'){\n  window.addEventListener('DOMContentLoaded', ()=> ensureLucide(boot));\n} else {\n  ensureLucide(boot);\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>\n"</script>
