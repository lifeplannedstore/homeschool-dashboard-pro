    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.

      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>

l:hover{ background:var(--bg); }\n.wg-cell.has-lesson:hover{ background:var(--surface); }\n.wg-cell .les{ background:var(--primary-soft); border-left:4px solid var(--primary); border-radius:6px; padding:7px 8px; position:absolute; inset:5px 5px auto 5px; z-index:10; overflow:hidden; box-shadow:0 2px 5px rgba(0,0,0,.08); }\n.wg-cell .les.done{ filter:saturate(.7); }\n.wg-cell .les.done .subject,.wg-cell .les.done .topic,.wg-cell .les.done .meta{ opacity:.68; }\n.wg-cell .les .subject{ font-size:12px; display:block; font-weight:700; }\n.wg-cell .les .topic{ font-size:11.5px; display:block; margin-top:2px; }\n.wg-cell .les .meta{ font-size:10.5px; color:var(--text-muted); margin-top:2px; }\n.wg-empty{ width:100%; height:100%; display:grid; place-items:center; color:var(--border); }\n.wg-empty svg{ width:18px; height:18px; }\n\n/* attendance grid */\n.attgrid-wrap{ overflow-x:auto; border:1px solid var(--border); border-radius:12px; background:var(--surface); }\n.attgrid{ border-collapse:collapse; font-size:12px; min-width:100%; }\n.attgrid th,.attgrid td{ border:1px solid var(--border); text-align:center; padding:0; }\n.attgrid th.studcol,.attgrid td.studcol{ text-align:left; padding:8px 12px; position:sticky; left:0; background:var(--surface); z-index:2; font-weight:600; white-space:nowrap; min-width:140px; }\n.attgrid th{ padding:7px 4px; font-size:10.5px; color:var(--text-muted); font-weight:600; min-width:30px; }\n.attgrid th.we{ background:var(--bg); }\n.att-c{ width:30px; height:34px; display:grid; place-items:center; font-family:'JetBrains Mono'; font-size:11px; font-weight:600; cursor:pointer; }\n.att-c.present{ background:rgba(92,171,125,.2); color:#3c8159; }\n.att-c.absent{ background:rgba(224,92,92,.2); color:#c0392b; }\n.att-c.excused{ background:rgba(232,168,56,.22); color:#a9750f; }\n.att-c.sick{ background:rgba(201,184,216,.32); color:#6f5b8a; }\n.att-c.holiday{ background:repeating-linear-gradient(45deg,var(--bg),var(--bg) 4px,var(--border) 4px,var(--border) 5px); color:var(--text-muted); }\n.att-c.weekend{ background:var(--bg); color:var(--border); cursor:default; }\n.att-c.empty{ color:var(--border); }\n\n/* book / trip / resource card */\n.gcards{ display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }\n.gcard{ background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:18px; display:flex; flex-direction:column; gap:9px; }\n.gcard h4{ font-size:16px; }\n.stars{ display:inline-flex; gap:2px; }\n.stars svg{ width:15px; height:15px; }\n.star-on{ color:var(--accent-2); fill:var(--accent-2); } .star-off{ color:var(--border); }\n\n/* yearly */\n.yeargrid{ display:grid; gap:1px; background:var(--border); border:1px solid var(--border); border-radius:12px; overflow:hidden; }\n.yeargrid > div{ background:var(--surface); padding:12px; }\n.yeargrid .yh{ font-weight:600; font-size:12.5px; }\n.yc{ min-height:64px; cursor:pointer; border-radius:0; font-size:12px; transition:background .15s; }\n.yc:hover{ background:var(--bg); }\n.yc .unit{ border-radius:6px; padding:6px 8px; font-size:11.5px; font-weight:500; margin-bottom:4px; }\n\n/* empty state */\n.empty{ text-align:center; padding:54px 20px; color:var(--text-muted); }\n.empty svg{ width:42px; height:42px; opacity:.4; margin-bottom:12px; }\n.empty h3{ font-size:18px; color:var(--text-primary); margin-bottom:6px; }\n\n/* segmented */\n.seg{ display:inline-flex; background:var(--bg); border:1px solid var(--border); border-radius:9px; padding:3px; gap:3px; }\n.seg button{ padding:6px 13px; border-radius:6px; font-size:12.5px; font-weight:600; color:var(--text-muted); }\n.seg button.on{ background:var(--surface); color:var(--text-primary); box-shadow:0 1px 3px rgba(0,0,0,.08); }\n\n/* swatch */\n.swatches{ display:flex; gap:9px; flex-wrap:wrap; }\n.swatch{ width:34px; height:34px; border-radius:9px; border:2px solid transparent; cursor:pointer; display:grid; place-items:center; }\n.swatch.on{ border-color:var(--text-primary); }\n.swatch svg{ width:16px; height:16px; color:#fff; opacity:0; }\n.swatch.on svg{ opacity:1; }\n.theme-card{ border:2px solid var(--border); border-radius:12px; padding:14px; cursor:pointer; transition:.15s; }\n.theme-card.on{ border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-soft); }\n.theme-swatches{ display:flex; gap:5px; margin-bottom:10px; }\n.theme-swatches span{ width:24px; height:24px; border-radius:6px; }\n\n.emoji-pick{ display:flex; gap:7px; flex-wrap:wrap; }\n.emoji-pick button{ width:42px; height:42px; border-radius:10px; border:2px solid var(--border); font-size:22px; display:grid; place-items:center; }\n.emoji-pick button.on{ border-color:var(--primary); background:var(--primary-soft); }\n\n.fab{ position:fixed; bottom:26px; right:26px; width:56px; height:56px; border-radius:50%; background:var(--primary); color:#fff; display:grid; place-items:center; box-shadow:0 8px 24px -4px var(--primary); z-index:90; transition:.2s; }\n.fab:hover{ transform:translateY(-2px) scale(1.04); }\n.fab svg{ width:26px; height:26px; }\n\n.spark{ display:flex; align-items:flex-end; gap:3px; height:34px; }\n.spark span{ flex:1; background:var(--primary); border-radius:2px; min-height:3px; opacity:.85; }\n\n.divider{ height:1px; background:var(--border); margin:20px 0; }\n.help-step{ display:flex; gap:14px; margin-bottom:18px; }\n.help-num{ width:32px; height:32px; border-radius:50%; background:var(--primary); color:#fff; display:grid; place-items:center; font-weight:700; font-family:'Fraunces'; flex-shrink:0; }\ndetails.faq{ border:1px solid var(--border); border-radius:10px; margin-bottom:9px; background:var(--surface); }\ndetails.faq summary{ padding:13px 16px; font-weight:600; cursor:pointer; font-size:14px; list-style:none; display:flex; justify-content:space-between; align-items:center; }\ndetails.faq summary::-webkit-details-marker{ display:none; }\ndetails.faq[open] summary{ border-bottom:1px solid var(--border); }\ndetails.faq .faq-body{ padding:13px 16px; color:var(--text-muted); font-size:13.5px; }\n\n.placeholder-img{ background:repeating-linear-gradient(45deg,var(--bg),var(--bg) 9px,var(--border) 9px,var(--border) 10px); border:1px dashed var(--text-muted); border-radius:10px; display:grid; place-items:center; color:var(--text-muted); font-family:'JetBrains Mono'; font-size:12px; text-align:center; padding:20px; }\n\n/* ===================== RESPONSIVE ===================== */\n@media (max-width:1023px){\n  .sidebar{ position:fixed; transform:translateX(-100%); box-shadow:0 0 40px rgba(0,0,0,.2); }\n  .sidebar.open{ transform:none; }\n  .sidebar.collapsed{ width:240px; min-width:240px; }\n  .hamburger{ display:inline-grid; }\n  .scrim{ position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:40; display:none; }\n  .scrim.show{ display:block; }\n}\n\n/* ===================== ACCESS GATE ===================== */\n.access-gate{\n  position:fixed; inset:0; z-index:1000; display:grid; place-items:center; padding:24px;\n  background:linear-gradient(135deg,var(--sidebar-bg),var(--bg));\n}\n.access-gate.hidden{ display:none; }\n.access-card{ width:min(420px,100%); text-align:center; }\n.access-card .brand-mark{ margin:0 auto 16px; width:52px; height:52px; }\n.access-error{ min-height:21px; color:#C83C3C; font-size:12.5px; margin-top:8px; }\n@media (max-width:640px){\n  .content{ padding:16px; }\n  .topbar{ padding:0 16px; }\n  .modal-overlay{ padding:16px 10px; }\n}\n\n/* ===================== PRINT ===================== */\n@media print{\n  .sidebar,.topbar,.fab,.toast-wrap,.no-print,.hamburger{ display:none !important; }\n  body,.app,.main,.content{ height:auto; overflow:visible; display:block; }\n  .content{ padding:0; }\n  .view{ display:none !important; }\n  .view.active{ display:block !important; }\n  .card,.stat,.gcard{ box-shadow:none !important; break-inside:avoid; }\n  .print-only{ display:block !important; }\n  @page{ margin:18mm 16mm; }\n  .report-doc{ max-width:none; }\n  .report-page{ break-after:page; }\n  .report-page:last-child{ break-after:auto; }\n}\n.print-only{ display:none; }\n<\u002Fstyle>\n\n<\u002Fhead>\n<body data-theme=\"meadow\">\n<div class=\"access-gate\" id=\"accessGate\">\n  <div class=\"card pad access-card\">\n    <div class=\"brand-mark\"><i data-lucide=\"graduation-cap\"><\u002Fi><\u002Fdiv>\n    <h2 style=\"font-size:25px;margin-bottom:8px\">Homeschool Dashboard Pro<\u002Fh2>\n    <p class=\"muted\" style=\"font-size:13.5px;margin-bottom:18px\">Enter your household access code to open the planner.<\u002Fp>\n    <form id=\"accessForm\">\n      <label class=\"fld\" style=\"text-align:left\"><span>Access code<\u002Fspan><input class=\"input\" id=\"accessCode\" type=\"password\" autocomplete=\"current-password\" autofocus /><\u002Flabel>\n      <button class=\"btn primary\" type=\"submit\" style=\"width:100%;justify-content:center\">Open planner<\u002Fbutton>\n      <div class=\"access-error\" id=\"accessError\" role=\"alert\"><\u002Fdiv>\n    <\u002Fform>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"app\">\n  <!-- SIDEBAR -->\n  <aside class=\"sidebar\" id=\"sidebar\">\n    <div class=\"brand\">\n      <div class=\"brand-mark\"><i data-lucide=\"graduation-cap\"><\u002Fi><\u002Fdiv>\n      <div class=\"brand-text\">\n        <b>Homeschool<\u002Fb>\n        <span>Dashboard Pro<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <nav class=\"nav\" id=\"nav\"><\u002Fnav>\n    <div class=\"sidebar-foot\">\n      <div id=\"footFamily\">The Henderson Family<\u002Fdiv>\n      <div style=\"margin-top:3px;opacity:.8\">Personal use licence<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Faside>\n  <div class=\"scrim\" id=\"scrim\"><\u002Fdiv>\n\n  <!-- MAIN -->\n  <div class=\"main\">\n    <header class=\"topbar\">\n      <button class=\"btn icon ghost hamburger\" id=\"hamburger\" aria-label=\"Toggle navigation\" aria-expanded=\"true\"><i data-lucide=\"menu\"><\u002Fi><\u002Fbutton>\n      <div>\n        <h1 id=\"pageTitle\">Dashboard<\u002Fh1>\n        <div class=\"crumb\" id=\"pageCrumb\">Today's overview<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"topbar-spacer\"><\u002Fdiv>\n      <div class=\"chip no-print\" id=\"termChip\"><i data-lucide=\"calendar\" style=\"width:14px;height:14px\"><\u002Fi> <span>Quarter 2 · Week 3<\u002Fspan><\u002Fdiv>\n    <\u002Fheader>\n    <main class=\"content\" id=\"content\"><\u002Fmain>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"modal-overlay\" id=\"modalOverlay\"><div class=\"modal\" id=\"modalBox\"><\u002Fdiv><\u002Fdiv>\n<div class=\"toast-wrap\" id=\"toastWrap\"><\u002Fdiv>\n\n<script>\n/* ============================================================\n   HOMESCHOOL DASHBOARD PRO — application logic\n   ============================================================ */\n/* ---------- CONSTANTS ---------- */\nif(!window.lucide){ window.lucide = { createIcons:function(){} }; }\nconst STORE_KEY = 'hsdpro_v1';\nconst ACCESS_CODE = 'HS2026';\nconst STUDENT_COLORS = {\n  Lavender:'#C9B8D8', Mint:'#7EC8A4', Peach:'#F7C59F',\n  Sky:'#A8D5BA', Butter:'#F9E784', Rose:'#F4A0A8'\n};\nconst SUBJECT_PALETTE = ['#7EC8A4','#C9B8D8','#F7C59F','#F9E784','#A8D5BA','#F4A0A8','#6BAED6','#D4785A'];\nconst AVATARS = ['📚','🌟','🎨','🔭','🎵','⚽','🦋','🌿'];\nconst DAYS = ['Mon','Tue','Wed','Thu','Fri'];\nconst GRADE_LEVELS = ['Pre-K','Kindergarten','Grade 1','Grade 2','Grade 3','Grade 4','Grade 5','Grade 6','Grade 7','Grade 8','Grade 9','Grade 10','Grade 11','Grade 12','Ungraded'];\nconst METHODS = ['Direct Instruction','Discussion','Project','Independent','Co-op','Online','Excursion'];\nconst ASSESS_TYPES = ['None','Oral','Written','Portfolio','Observation','Test'];\nconst LESSON_STATUS = ['Planned','Completed','Skipped','Rescheduled'];\nconst GENRES = ['Fiction','Non-Fiction','Science','History','Biography','Poetry','Reference','Religious'];\nconst BOOK_STATUS = ['Wishlist','In Progress','Completed','Abandoned'];\nconst ASSIGNED_BY = ['Self-chosen','Teacher-assigned','Co-op','Library pick'];\nconst RES_TYPES = ['Website','Book','Video','Supplier','Printable','App','Course','Other'];\nconst TRIP_STATUS = ['Planned','Completed','Cancelled'];\nconst GRADE_SCALES = {\n  Australian:[ {g:'A',min:85,gpa:4.0},{g:'B',min:70,gpa:3.0},{g:'C',min:55,gpa:2.0},{g:'D',min:40,gpa:1.0},{g:'F',min:0,gpa:0} ],\n  US:[ {g:'A',min:90,gpa:4.0},{g:'B',min:80,gpa:3.0},{g:'C',min:70,gpa:2.0},{g:'D',min:60,gpa:1.0},{g:'F',min:0,gpa:0} ]\n};\nconst DEFAULT_US_HOLIDAYS = [\n  {label:'Martin Luther King Jr. Day',date:'2025-01-20'},\n  {label:\"Presidents' Day\",date:'2025-02-17'},\n  {label:'Memorial Day',date:'2025-05-26'},\n  {label:'Juneteenth',date:'2025-06-19'},\n  {label:'Independence Day',date:'2025-07-04'},\n  {label:'Labor Day',date:'2025-09-01'},\n  {label:'Veterans Day',date:'2025-11-11'},\n  {label:'Thanksgiving Day',date:'2025-11-27'},\n  {label:'Christmas Day',date:'2025-12-25'}\n];\nconst uid = () => Math.random().toString(36).slice(2,9);\n\n/* ---------- DATE HELPERS ---------- */\nconst pad = n => String(n).padStart(2,'0');\nconst timeFromMinutes = mins => `${pad(Math.floor(mins/60))}:${pad(mins%60)}`;\nconst timeToMinutes = time => { const [h,m]=String(time||'00:00').split(':').map(Number); return h*60+m; };\nconst ymd = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;\nconst parseYmd = s => { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); };\nconst addDays = (d,n) => { const x=new Date(d); x.setDate(x.getDate()+n); return x; };\nconst mondayOf = d => { const x=new Date(d); const day=(x.getDay()+6)%7; return addDays(x,-day); };\nconst fmtDate = (d,opts) => d.toLocaleDateString('en-US',opts||{weekday:'short',day:'numeric',month:'short'});\nconst fmtLong = d => d.toLocaleDateString('en-US',{weekday:'long',day:'numeric',month:'long',year:'numeric'});\nconst isWeekend = d => d.getDay()===0 || d.getDay()===6;\nconst daysBetween = (a,b) => Math.round((parseYmd(b)-parseYmd(a))/86400000);\n\n/* \"Today\" is pinned to the demo persona's context: a Tuesday in Week 3, Term 2 */\nfunction appToday(){\n  if(DB && DB.settings && DB.settings.pinnedToday) return parseYmd(DB.settings.pinnedToday);\n  return new Date();\n}\n\n/* ---------- STATE ---------- */\nlet DB = null;\nlet UI = { tab:'dashboard', lpStudent:null, lpWeekStart:null, gradeStudent:null, gradeSubject:null,\n           readStudent:null, readFilter:'All', attMonth:null, yearStudent:null, yearView:'Term' };\nlet charts = {};\n\n/* ---------- PERSISTENCE ---------- */\nlet saveTimer=null;\nfunction save(showToast){\n  clearTimeout(saveTimer);\n  saveTimer = setTimeout(()=>{\n    try{ localStorage.setItem(STORE_KEY, JSON.stringify(DB)); if(showToast) toast('Saved','check'); }\n    catch(e){ toast('Could not save — storage full','alert-triangle'); }\n  }, 400);\n}\nfunction load(){\n  try{ const raw=localStorage.getItem(STORE_KEY); if(raw){ DB=JSON.parse(raw); return true; } }catch(e){}\n  return false;\n}\n\n/* ---------- TOAST ---------- */\nfunction toast(msg, icon){\n  const w=document.getElementById('toastWrap');\n  const t=document.createElement('div'); t.className='toast';\n  t.innerHTML=`<i data-lucide=\"${icon||'check'}\"><\u002Fi><span>${msg}<\u002Fspan>`;\n  w.appendChild(t); lucide.createIcons({attrs:{width:17,height:17}});\n  setTimeout(()=>{ t.style.transition='.3s'; t.style.opacity='0'; t.style.transform='translateY(10px)'; setTimeout(()=>t.remove(),300); }, 2200);\n}\n\n/* ---------- ESCAPING ---------- */\nconst esc = s => String(s==null?'':s).replace(/[&<>\"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',\"'\":'&#39;'}[c]));\n\n/* ============================================================\n   DEMO DATA — The Henderson Family\n   ============================================================ */\nfunction demoData(){\n  const YEAR_START = '2025-01-29';          // school year anchor\n  const PINNED = '2025-05-13';              // a Tuesday, Week 3 of Term 2\n  const sophie=uid(), james=uid(), lily=uid();\n\n  const subj = (nam unit,status} -----\n  const yearly={};\n  yearly[sophie]={\n    English:{1:{unit:'Narrative & Recount',status:'complete'},2:{unit:'Persuasive & Poetry',status:'progress'},3:{unit:'Novel Study',status:'planned'},4:{unit:'Research Report',status:'planned'}},\n    Maths:{1:{unit:'Number & Fractions',status:'complete'},2:{unit:'Decimals & Percentages',status:'progress'},3:{unit:'Geometry & Measurement',status:'planned'},4:{unit:'Data & Probability',status:'planned'}},\n    Science:{1:{unit:'Living Things',status:'complete'},2:{unit:'Plants & Ecosystems',status:'progress'},3:{unit:'States of Matter',status:'planned'},4:{unit:'Earth & Space',status:'planned'}},\n    History:{1:{unit:'Early Civilisations',status:'complete'},2:{unit:'Ancient Egypt',status:'progress'},3:{unit:'Ancient Greece',status:'planned'},4:{unit:'Ancient Rome',status:'planned'}},\n  };\n\n  return {\n    version:'1.0.0',\n    students, lessons, attendance, grades, reading, trips, resources, yearly,\n    settings:{\n      familyName:'The Henderson Family',\n      yearStart:YEAR_START,\n      pinnedToday:PINNED,\n      theme:'meadow',\n      gradeScaleName:'US',\n      customGradeScale:[ {g:'A',min:90,gpa:4.0},{g:'B',min:80,gpa:3.0},{g:'C',min:70,gpa:2.0},{g:'D',min:60,gpa:1.0},{g:'F',min:0,gpa:0} ],\n      terms:[ {n:1,start:'2025-01-29',end:'2025-04-04'},{n:2,start:'2025-04-28',end:'2025-06-27'},{n:3,start:'2025-07-15',end:'2025-09-19'},{n:4,start:'2025-10-07',end:'2025-12-12'} ],\n      holidays:DEFAULT_US_HOLIDAYS.map(h=>({...h})),\n      currentTerm:2\n    }\n  };\n}\n\n/* ============================================================\n   CORE: nav, router, modal, theme, helpers\n   ============================================================ */\nconst NAV = [\n  {group:'Plan', items:[\n    {id:'dashboard', label:'Dashboard', icon:'layout-dashboard', crumb:\"Today's overview\"},\n    {id:'lessons', label:'Lesson Planner', icon:'book-open', crumb:'Weekly lesson plans'},\n    {id:'yearly', label:'Yearly Planner', icon:'calendar-days', crumb:'Scope & sequence'},\n  ]},\n  {group:'Track', items:[\n    {id:'attendance', label:'Attendance', icon:'calendar-check', crumb:'Daily records & rate'},\n    {id:'grades', label:'Grades', icon:'graduation-cap', crumb:'Scores & GPA'},\n    {id:'reading', label:'Reading Tracker', icon:'library', crumb:'Books & reading log'},\n    {id:'trips', label:'Field Trips', icon:'map-pin', crumb:'Excursion log'},\n  ]},\n  {group:'Organise', items:[\n    {id:'students', label:'Students', icon:'users', crumb:'Manage profiles'},\n    {id:'subjects', label:'Subjects', icon:'book-copy', crumb:'Add and change subjects'},\n    {id:'resources', label:'Resources', icon:'link', crumb:'Curriculum library'},\n    {id:'reports', label:'Reports', icon:'file-text', crumb:'Printable records'},\n  ]},\n  {group:'System', items:[\n    {id:'settings', label:'Settings', icon:'settings', crumb:'Themes & data'},\n    {id:'instructions', label:'Instructions', icon:'help-circle', crumb:'Guide & FAQ'},\n  ]},\n];\n\nfunction buildNav(){\n  const nav=document.getElementById('nav');\n  nav.innerHTML = NAV.map(g=>`\n    <div class=\"nav-group-label\">${g.group}<\u002Fdiv>\n    ${g.items.map(it=>`<button class=\"nav-item\" data-tab=\"${it.id}\"><i data-lucide=\"${it.icon}\"><\u002Fi><span>${it.label}<\u002Fspan><\u002Fbutton>`).join('')}\n  `).join('');\n  nav.querySelectorAll('.nav-item').forEach(b=> b.onclick=()=>go(b.dataset.tab));\n}\n\nconst RENDERERS = {}; // tab id -> render fn (populated by each module)\nfunction go(tab){\n  UI.tab=tab;\n  document.querySelectorAll('.nav-item').forEach(b=> b.classList.toggle('active', b.dataset.tab===tab));\n  const meta = NAV.flatMap(g=>g.items).find(i=>i.id===tab);\n  document.getElementById('pageTitle').textContent = meta.label;\n  document.getElementById('pageCrumb').textContent = meta.crumb;\n  // ensure view container\n  const content=document.getElementById('content');\n  let view=document.getElementById('view-'+tab);\n  if(!view){ view=document.createElement('div'); view.id='view-'+tab; view.className='view'; content.appendChild(view); }\n  content.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));\n  view.classList.add('active');\n  if(RENDERERS[tab]) RENDERERS[tab](view);\n  lucide.createIcons();\n  content.scrollTop=0;\n  // close mobile sidebar\n  document.getElementById('sidebar').classList.remove('open');\n  document.getElementById('scrim').classList.remove('show');\n}\n\n/* ---------- MODAL ---------- */\nfunction openModal(html, opts){\n  opts=opts||{};\n  const ov=document.getElementById('modalOverlay'), box=document.getElementById('modalBox');\n  box.className='modal'+(opts.wide?' wide':'');\n  box.innerHTML=html;\n  ov.classList.add('open');\n  lucide.createIcons();\n  if(opts.onOpen) opts.onOpen(box);\n}\nfunction closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); }\ndocument.getElementById('modalOverlay').addEventListener('click', e=>{ if(e.target.id==='modalOverlay') closeModal(); });\ndocument.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });\n\nfunction confirmModal(title, msg, onYes, opts){\n  opts=opts||{};\n  openModal(`\n    <div class=\"modal-head\"><h3>${esc(title)}<\u002Fh3><button class=\"btn icon ghost\" onclick=\"closeModal()\"><i data-lucide=\"x\"><\u002Fi><\u002Fbutton><\u002Fdiv>\n    <div class=\"modal-body\"><p style=\"color:var(--text-muted);line-height:1.6\">${msg}<\u002Fp>\n    ${opts.typeToConfirm?`<input class=\"input\" id=\"confirmType\" placeholder='Type \"${opts.typeToConfirm}\" to confirm' style=\"margin-top:14px\" />`:''}<\u002Fdiv>\n    <div class=\"modal-foot\">\n      <button class=\"btn ghost\" onclick=\"closeModal()\">Cancel<\u002Fbutton>\n      <button class=\"btn ${opts.danger?'danger':'primary'}\" id=\"confirmYes\">${opts.yesLabel||'Confirm'}<\u002Fbutton>\n    <\u002Fdiv>`);\n  document.getElementById('confirmYes').onclick=()=>{\n    if(opts.typeToConfirm){ const v=document.getElementById('confirmType').value.trim(); if(v!==opts.typeToConfirm){ toast('Text did not match','alert-triangle'); return; } }\n    closeModal(); onYes();\n  };\n}\n\n/* ---------- THEME ---------- */\nfunction applyTheme(){\n  document.body.dataset.theme = DB.settings.theme||'meadow';\n  // refresh charts to pick up theme colours\n  if(UI.tab && RENDERERS[UI.tab]){ const v=document.getElementById('view-'+UI.tab); if(v) RENDERERS[UI.tab](v); }\n}\nfunction cssVar(name){ return getComputedStyle(document.body).getPropertyValue(name).trim(); }\n\n/* ---------- DATA ACCESSORS ---------- */\nconst activeStudents = () => DB.students.filter(s=>s.active);\nconst studentById = id => DB.students.find(s=>s.id===id);\nfunction studentColor(s){ return STUDENT_COLORS[s.color]||'#7EC8A4'; }\n\nfunction todaySubjectsFor(student, dateStr){\n  // subjects that have a lesson on this date OR (fallback) all subjects\n  const lessonsToday = student.subjects.filter(su=> DB.lessons[`${student.id}|${su.id}|${dateStr}`]);\n  return lessonsToday.length? lessonsToday : student.subjects;\n}\nfunction lessonFor(stuId,subjId,dateStr){ return DB.lessons[`${stuId}|${subjId}|${dateStr}`]; }\n\n/* attendance computation */\nfunction attendanceStats(stuId, fromStr, toStr){\n  let present=0,absent=0,excused=0,sick=0,total=0;\n  Object.keys(DB.attendance).forEach(k=>{\n    const [sid,date]=k.split('|');\n    if(sid!==stuId) return;\n    if(fromStr && date<fromStr) return;\n    if(toStr && date>toStr) return;\n    const st=DB.attendance[k];\n    if(st==='holiday') return;\n    total++;\n    if(st==='present')present++; else if(st==='absent')absent++; else if(st==='excused')excused++; else if(st==='sick')sick++;\n  });\n  const attended=present;\n  const rate = total? Math.round((attended/total)*1000)/10 : 0;\n  return {present,absent,excused,sick,total,rate};\n}\n\n/* grade computation */\nfunction activeGradeScale(){\n  if(DB.settings.gradeScaleName==='Custom') return DB.settings.customGradeScale||GRADE_SCALES.US;\n  return GRADE_SCALES[DB.settings.gradeScaleName]||GRADE_SCALES.US;\n}\nfunction gradeLetterFor(pct){ const scale=activeGradeScale(); for(const g of scale){ if(pct>=g.min) return g; } return scale[scale.length-1]; }\nfunction subjectAverage(stuId, subjId){\n  const list=(DB.grades[stuId]&&DB.grades[stuId][subjId])||[];\n  if(!list.length) return null;\n  let wSum=0, wTot=0;\n  list.forEach(a=>{ const pct=a.max?(a.score/a.max)*100:0; const w=a.weight||0; wSum+=pct*w; wTot+=w; });\n  const avg = wTot? wSum/wTot : (list.reduce((s,a)=>s+(a.max?(a.score/a.max)*100:0),0)/list.length);\n  return Math.round(avg*10)/10;\n}\nfunction studentGPA(stuId){\n  const subs = studentById(stuId).subjects;\n  let gpaSum=0,n=0;\n  subs.forEach(su=>{ const avg=subjectAverage(stuId,su.id); if(avg!=null){ gpaSum+=gradeLetterFor(avg).gpa; n++; } });\n  return n? Math.round((gpaSum/n)*100)/100 : null;\n}\n\n/* ============================================================\n   TAB 1 — DASHBOARD (Today View)\n   ============================================================ */\nRENDERERS.dashboard = function(view){\n  const today = appToday();\n  const todayStr = ymd(today);\n  const dow = today.getDay(); // 0 sun..6 sat\n  const term = DB.settings.terms.find(t=> todayStr>=t.start && todayStr<=t.end) || DB.settings.terms[DB.settings.currentTerm-1];\n  const weekNum = term ? Math.floor(daysBetween(term.start, todayStr)/7)+1 : 1;\n  const students = activeStudents();\n\n  view.innerHTML = `\n    <div class=\"pagehead\">\n      <div>\n        <h1 style=\"font-size:26px\">${[\"Sunday\",\"Monday\",\"Tuesday\",\"Wednesday\",\"Thursday\",\"Friday\",\"Saturday\"][dow]}, ${fmtDate(today,{day:'numeric',month:'long'})}<\u002Fh1>\n        <div class=\"lead\">${DB.settings.familyName} · ${term?('Quarter '+term.n):''} · Week ${weekNum} of quarter<\u002Fdiv>\n      <\u002Fdiv>\n      <button class=\"btn primary\" id=\"quickAddBtn\"><i data-lucide=\"plus\"><\u002Fi> Quick add lesson<\u002Fbutton>\n    <\u002Fdiv>\n\n    <div class=\"grid\" id=\"dashCards\" style=\"grid-template-columns:repeat(auto-fill,minmax(310px,1fr));margin-bottom:26px\"><\u002Fdiv>\n\n    <div class=\"grid\" style=\"grid-template-columns:1.1fr 1fr;align-items:stretch\" id=\"dashWidgets\"><\u002Fdiv>\n  `;\n\n  // ---- student cards ----\n  const cards = students.map(s=>{\n    const subs = todaySubjectsFor(s, todayStr);\n    const doneCount = subs.filter(su=>{ const l=lessonFor(s.id,su.id,todayStr); return l&&l.done; }).length;\n    const pct = subs.length? Math.round(doneCount/subs.length*100):0;\n    const att = DB.attendance[`${s.id}|${todayStr}`]||'';\n    const col = studentColor(s);\n    return `\n    <div class=\"scard\">\n      <div class=\"scard-top\">\n        <div class=\"scard-stripe\" style=\"background:${col}\"><\u002Fdiv>\n        <div class=\"savatar\" style=\"background:${col}33\">${s.avatar}<\u002Fdiv>\n        <div style=\"flex:1;min-width:0\">\n          <div style=\"font-family:'Fraunces';font-weight:600;font-size:17px\">${esc(s.name.split(' ')[0])}<\u002Fdiv>\n          <div class=\"muted\" style=\"font-size:12.5px\">${esc(s.grade)}<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ring\" style=\"--p:${pct}\"><span>${pct}%<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"scard-body\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:10px\">\n          <span class=\"muted\" style=\"font-size:12px;font-weight:600\">${doneCount}/${subs.length} subjects today<\u002Fspan>\n          <div class=\"att-toggle\" data-stu=\"${s.id}\">\n            <button data-s=\"present\" class=\"${att==='present'?'on':''}\">Present<\u002Fbutton>\n            <button data-s=\"absent\" class=\"${att==='absent'?'on':''}\">Absent<\u002Fbutton>\n            <button data-s=\"excused\" class=\"${att==='excused'?'on':''}\">Excused<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"subj-list\">\n          ${subs.map(su=>{ const l=lessonFor(s.id,su.id,todayStr); const done=l&&l.done;\n            return `<div class=\"subj-row ${done?'done':''}\" data-stu=\"${s.id}\" data-subj=\"${su.id}\">\n              <div class=\"subj-check ${done?'on':''}\"><i data-lucide=\"check\"><\u002Fi><\u002Fdiv>\n              <span class=\"subj-name\">${esc(su.name)}<\u002Fspan>\n              ${l&&l.topic?`<span class=\"muted\" style=\"font-size:11.5px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">${esc(l.topic)}<\u002Fspan>`:`<span class=\"muted\" style=\"font-size:11px;font-style:italic\">no plan<\u002Fspan>`}\n            <\u002Fdiv>`; }).join('')}\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join('');\n  view.querySelector('#dashCards').innerHTML = cards || `<div class=\"empty card pad\"><i data-lucide=\"users\"><\u002Fi><h3>No active students<\u002Fh3><p>Add a student to get started.<\u002Fp><\u002Fdiv>`;\n\n  // subject check toggles\n  view.querySelectorAll('.subj-row').forEach(row=>{\n    row.querySelector('.subj-check').onclick=()=>{\n      const stu=row.dataset.stu, subj=row.dataset.subj, key=`${stu}|${subj}|${todayStr}`;\n      let l=DB.lessons[key];\n      if(!l){ l=DB.lessons[key]={id:uid(),topic:'',objectives:'',materials:'',method:'Direct Instruction',assessment:'None',duration:45,notes:'',status:'Planned',done:false}; }\n      l.done=!l.done; l.status=l.done?'Completed':'Planned';\n      save(); RENDERERS.dashboard(view); lucide.createIcons();\n    };\n  });\n  // attendance toggles\n  view.querySelectorAll('.att-toggle button').forEach(b=>{\n    b.onclick=()=>{ const stu=b.parentElement.dataset.stu, s=b.dataset.s, key=`${stu}|${todayStr}`;\n      DB.attendance[key] = DB.attendance[key]===s ? '' : s;\n      if(!DB.attendance[key]) delete DB.attendance[key];\n      save(); RENDERERS.dashboard(view); lucide.createIcons(); };\n  });\n  view.querySelector('#quickAddBtn').onclick=quickAddLesson;\n\n  // ---- widgets ----\n  // weekly attendance sparkline\n  const wkStart = mondayOf(today);\n  const sparkRows = students.map(s=>{\n    const bars = DAYS.map((d,i)=>{ const st=DB.attendance[`${s.id}|${ymd(addDays(wkStart,i))}`];\n      const colMap={present:'#5CAB7D',absent:'#E05C5C',excused:'#E8A838',sick:'#C9B8D8'};\n      const h = st? (st==='present'?100:60):14;\n      return `<span title=\"${DAYS[i]}: ${st||'—'}\" style=\"background:${colMap[st]||'var(--border)'};height:${h}%\"><\u002Fspan>`;\n    }).join('');\n    const stats=attendanceStats(s.id, DB.settings.terms.find(t=>t.n===DB.settings.currentTerm).start, todayStr);\n    return `<div style=\"display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px dashed var(--border)\">\n      <div class=\"dot\" style=\"background:${studentColor(s)};width:11px;height:11px\"><\u002Fdiv>\n      <span style=\"flex:1;font-size:13.5px;font-weight:500\">${esc(s.name.split(' ')[0])}<\u002Fspan>\n      <div class=\"spark\" style=\"width:120px;align-items:flex-end\">${bars}<\u002Fdiv>\n      <span class=\"mono\" style=\"font-size:13px;font-weight:600;width:46px;text-align:right\">${stats.rate}%<\u002Fspan>\n    <\u002Fdiv>`;\n  }).join('');\n\n  // upcoming trips\n  const upcoming = DB.trips.filter(t=>t.status==='Planned' && t.date>=todayStr).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,3);\n  const tripsHtml = upcoming.length? upcoming.map(t=>{\n    const days=daysBetween(todayStr,t.date);\n    return `<div style=\"display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px dashed var(--border)\">\n      <div style=\"width:42px;height:42px;border-radius:10px;background:var(--accent-1)33;display:grid;place-items:center;flex-shrink:0\"><i data-lucide=\"map-pin\" style=\"width:18px;color:var(--text-primary)\"><\u002Fi><\u002Fdiv>\n      <div style=\"flex:1\"><div style=\"font-weight:600;font-size:14px\">${esc(t.name)}<\u002Fdiv><div class=\"muted\" style=\"font-size:12px\">${fmtDate(parseYmd(t.date),{weekday:'short',day:'numeric',month:'short'})} · ${esc(t.location)}<\u002Fdiv><\u002Fdiv>\n      <span class=\"badge blue\">${days===0?'Today':days===1?'Tomorrow':days+' days'}<\u002Fspan>\n    <\u002Fdiv>`;\n  }).join('') : `<p class=\"muted\" style=\"font-size:13px;padding:8px 0\">No upcoming trips planned.<\u002Fp>`;\n\n  // reading in progress\n  const reading = DB.reading.filter(b=>b.status==='In Progress');\n  const readHtml = reading.length? reading.map(b=>{ const s=studentById(b.student);\n    return `<div style=\"display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px dashed var(--border)\">\n      <div class=\"savatar\" style=\"width:36px;height:36px;font-size:18px;background:${s?studentColor(s):'#ccc'}33\">${s?s.avatar:'📖'}<\u002Fdiv>\n      <div style=\"flex:1\"><div style=\"font-weight:600;font-size:13.5px\">${esc(b.title)}<\u002Fdiv><div class=\"muted\" style=\"font-size:12px\">${esc(b.author)} · ${s?esc(s.name.split(' ')[0]):''}<\u002Fdiv><\u002Fdiv>\n      <span class=\"badge amber\">Reading<\u002Fspan>\n    <\u002Fdiv>`;\n  }).join('') : `<p class=\"muted\" style=\"font-size:13px;padding:8px 0\">No books currently in progress.<\u002Fp>`;\n\n  const gpaRows=students.map(s=>{\n    const gpa=studentGPA(s.id);\n    const assessed=s.subjects.filter(su=>subjectAverage(s.id,su.id)!=null).length;\n    const pct=gpa==null?0:Math.round(gpa/4*100);\n    return `<div style=\"display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px dashed var(--border)\">\n      <div class=\"savatar\" style=\"width:38px;height:38px;font-size:18px;background:${studentColor(s)}33\">${s.avatar}<\u002Fdiv>\n      <div style=\"flex:1\">\n        <div style=\"display:flex;justify-content:space-between;gap:12px;margin-bottom:5px\"><span style=\"font-weight:600\">${esc(s.name.split(' ')[0])}<\u002Fspan><span class=\"mono\" style=\"font-weight:700\">${gpa!=null?gpa.toFixed(2):'—'} <span class=\"muted\" style=\"font-size:11px\">/ 4.0<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div style=\"height:8px;background:var(--border);border-radius:5px;overflow:hidden\"><div style=\"height:100%;width:${pct}%;background:${studentColor(s)}\"><\u002Fdiv><\u002Fdiv>\n        <div class=\"muted\" style=\"font-size:10.5px;margin-top:4px\">${assessed?assessed+' assessed subject'+(assessed===1?'':'s'):'No grades recorded yet'}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join('');\n\n  view.querySelector('#dashWidgets').innerHTML = `\n    <div class=\"card pad\" style=\"height:100%\">\n      <div class=\"section-title\"><i data-lucide=\"bar-chart-3\"><\u002Fi> This week's attendance<\u002Fdiv>\n      ${sparkRows}\n    <\u002Fdiv>\n    <div class=\"card pad\" style=\"height:100%\">\n      <div class=\"section-title\"><i data-lucide=\"map-pin\"><\u002Fi> Upcoming field trips<\u002Fdiv>\n      ${tripsHtml}\n    <\u002Fdiv>\n    <div class=\"card pad\" style=\"height:100%\">\n      <div class=\"section-title\"><i data-lucide=\"graduation-cap\"><\u002Fi> GPA by child<\u002Fdiv>\n      ${gpaRows}\n    <\u002Fdiv>\n    <div class=\"card pad\" style=\"height:100%\">\n      <div class=\"section-title\"><i data-lucide=\"book-open\"><\u002Fi> Reading in progress<\u002Fdiv>\n      ${readHtml}\n    <\u002Fdiv>\n  `;\n  lucide.createIcons();\n};\n\nfunction quickAddLesson(){\n  const students=activeStudents();\n  if(!students.length){ toast('Add a student first','alert-triangle'); return; }\n  const todayStr=ymd(appToday());\n  openModal(`\n    <div class=\"modal-head\"><h3>Quick add lesson<\u002Fh3><button class=\"btn icon ghost\" onclick=\"closeModal()\"><i data-lucide=\"x\"><\u002Fi><\u002Fbutton><\u002Fdiv>\n    <div class=\"modal-body\">\n      <label class=\"fld\"><span>Student<\u002Fspan><select class=\"input\" id=\"qaStu\">${students.map(s=>`<option value=\"${s.id}\">${esc(s.name)}<\u002Foption>`).join('')}<\u002Fselect><\u002Flabel>\n      <label class=\"fld\"><span>Subject<\u002Fspan><select class=\"input\" id=\"qaSubj\"><\u002Fselect><\u002Flabel>\n      <label class=\"fld\"><span>Topic / Title<\u002Fspan><input class=\"input\" id=\"qaTopic\" placeholder=\"e.g. Fractions review\" /><\u002Flabel>\n      <label class=\"fld\"><span>Date<\u002Fspan><input class=\"input\" type=\"date\" id=\"qaDate\" value=\"${todayStr}\" /><\u002Flabel>\n      <div class=\"row\" style=\"gap:14px\">\n        <label class=\"fld\" style=\"flex:1\"><span>Start time<\u002Fspan><select class=\"input\" id=\"qaStart\">${Array.from({length:31},(_,i)=>{ const mins=360+i*30,t=`${pad(Math.floor(mins/60))}:${pad(mins%60)}`; return `<option value=\"${t}\" ${t==='09:00'?'selected':''}>${t}<\u002Foption>`; }).join('')}<\u002Fselect><\u002Flabel>\n        <label class=\"fld\" style=\"flex:1\"><span>End time<\u002Fspan><select class=\"input\" id=\"qaEnd\">${Array.from({length:31},(_,i)=>{ const mins=360+i*30,t=`${pad(Math.floor(mins/60))}:${pad(mins%60)}`; return `<option value=\"${t}\" ${t==='09:30'?'selected':''}>${t}<\u002Foption>`; }).join('')}<\u002Fselect><\u002Flabel>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"modal-foot\"><button class=\"btn ghost\" onclick=\"closeModal()\">Cancel<\u002Fbutton><button class=\"btn primary\" id=\"qaSave\">Add lesson<\u002Fbutton><\u002Fdiv>\n  `,{onOpen:box=>{\n    const stuSel=box.querySelector('#qaStu'), subjSel=box.querySelector('#qaSubj');\n    const fillSubj=()=>{ const s=studentById(stuSel.value); subjSel.innerHTML=s.subjects.map(su=>`<option value=\"${su.id}\">${esc(su.name)}<\u002Foption>`).join(''); };\n    fillSubj(); stuSel.onchange=fillSubj;\n    box.querySelector('#qaSave').onclick=()=>{\n      const stu=stuSel.value, subj=subjSel.value, date=box.querySelector('#qaDate').value, topic=box.querySelector('#qaTopic').value.trim();\n      if(!topic){ toast('Enter a topic','alert-triangle'); return; }\n      const startTime=box.querySelector('#qaStart').value, endTime=box.querySelector('#qaEnd').value;\n      const [sh,sm]=startTime.split(':').map(Number), [eh,em]=endTime.split(':').map(Number), duration=(eh*60+em)-(sh*60+sm);\n      if(duration<=0){ toast('End time must be after start time','alert-triangle'); return; }\n      DB.lessons[`${stu}|${subj}|${date}`]={id:uid(),topic,objectives:'',materials:'',method:'Direct Instruction',assessment:'None',startTime,endTime,duration,notes:'',status:'Planned',done:false};\n      save(true); closeModal(); if(UI.tab==='dashboard') RENDERERS.dashboard(document.getElementById('view-dashboard'));\n    };\n  }});\n}\n\n/* ============================================================\n   TAB 2 — STUDENTS (Profile Manager)\n   ============================================================ */\nRENDERERS.students = function(view){\n  const canAdd = DB.students.length < 5;\n  view.innerHTML = `\n    <div class=\"pagehead\">\n      <div><div class=\"lead\">Manage up to 5 student profiles. Each student has their own colour, avatar, and subject list. Archived students are hidden from planning views but keep all their data.<\u002Fdiv><\u002Fdiv>\n      <button class=\"btn primary\" id=\"addStu\" ${canAdd?'':'disabled style=\"opacity:.5;cursor:not-allowed\"'}><i data-lucide=\"user-plus\"><\u002Fi> Add student ${DB.students.length}/5<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"grid\" id=\"stuList\" style=\"grid-template-columns:repeat(auto-fill,minmax(360px,1fr))\"><\u002Fdiv>\n  `;\n  const listEl=view.querySelector('#stuList');\n  listEl.innerHTML = DB.students.map(s=>{\n    const col=studentColor(s);\n    return `<div class=\"card\" style=\"overflow:hidden;${s.active?'':'opacity:.62'}\">\n      <div style=\"padding:18px 20px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--border);position:relative\">\n        <div style=\"position:absolute;left:0;top:0;bottom:0;width:5px;background:${col}\"><\u002Fdiv>\n        <div class=\"savatar\" style=\"background:${col}33;width:50px;height:50px;font-size:26px\">${s.avatar}<\u002Fdiv>\n        <div style=\"flex:1;min-width:0\">\n          <div style=\"font-family:'Fraunces';font-weight:600;font-size:18px\">${esc(s.name)}<\u002Fdiv>\n          <div class=\"muted\" style=\"font-size:13px\">${esc(s.grade)}${s.dob?' · born '+fmtDate(parseYmd(s.dob),{day:'numeric',month:'short',year:'numeric'}):''}<\u002Fdiv>\n        <\u002Fdiv>\n        ${s.active?'<span class=\"badge green\">Active<\u002Fspan>':'<span class=\"badge grey\">Archived<\u002Fspan>'}\n      <\u002Fdiv>\n      <div style=\"padding:16px 20px\">\n        <div class=\"muted\" style=\"font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:9px\">${s.subjects.length} subjects<\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px\">\n          ${s.subjects.map(su=>`<span class=\"chip\" style=\"background:${su.color}22;color:var(--text-primary)\"><span class=\"dot\" style=\"background:${su.color}\"><\u002Fspan>${esc(su.name)} <span class=\"muted\">·${su.freq}d<\u002Fspan><\u002Fspan>`).join('')||'<span class=\"muted\" style=\"font-size:13px\">No subjects yet<\u002Fspan>'}\n        <\u002Fdiv>\n        ${s.notes?`<div class=\"muted\" style=\"font-size:12.5px;font-style:italic;border-top:1px dashed var(--border);padding-top:11px;margin-bottom:12px\">${esc(s.notes)}<\u002Fdiv>`:''}\n        <div style=\"display:flex;gap:8px\">\n          <button class=\"btn sm\" data-edit=\"${s.id}\"><i data-lucide=\"pencil\"><\u002Fi> Edit student & subjects<\u002Fbutton>\n          <button class=\"btn sm ghost\" data-arch=\"${s.id}\"><i data-lucide=\"${s.active?'archive':'archive-restore'}\"><\u002Fi> ${s.active?'Archive':'Restore'}<\u002Fbutton>\n          <div style=\"flex:1\"><\u002Fdiv>\n          <button class=\"btn sm ghost\" data-del=\"${s.id}\" style=\"color:#E05C5C\"><i data-lucide=\"trash-2\"><\u002Fi><\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join('') || `<div class=\"empty card pad\"><i data-lucide=\"users\"><\u002Fi><h3>No students yet<\u002Fh3><p>Add your first student to start planning.<\u002Fp><\u002Fdiv>`;\n\n  view.querySelector('#addStu').onclick=()=>{ if(canAdd) studentModal(null); };\n  listEl.querySelectorAll('[data-edit]').forEach(b=> b.onclick=()=>studentModal(b.dataset.edit));\n  listEl.querySelectorAll('[data-arch]').forEach(b=> b.onclick=()=>{ const s=studentById(b.dataset.arch); s.active=!s.active; save(true); RENDERERS.students(view); lucide.createIcons(); });\n  listEl.querySelectorAll('[data-del]').forEach(b=> b.onclick=()=>{ const s=studentById(b.dataset.del);\n    confirmModal('Delete '+s.name+'?', `This will <b>permanently delete all data<\u002Fb> for ${esc(s.name)} — lessons, attendance, grades, and reading log. This cannot be undone.`, ()=>{\n      DB.students=DB.students.filter(x=>x.id!==s.id);\n      delete DB.grades[s.id]; delete DB.yearly[s.id];\n      DB.reading=DB.reading.filter(r=>r.student!==s.id);\n      Object.keys(DB.lessons).forEach(k=>{ if(k.startsWith(s.id+'|')) delete DB.lessons[k]; });\n      Object.keys(DB.attendance).forEach(k=>{ if(k.startsWith(s.id+'|')) delete DB.attendance[k]; });\n      save(true); RENDERERS.students(view); lucide.createIcons(); toast(s.name+' deleted','trash-2');\n    },{danger:true,yesLabel:'Delete permanently'});\n  });\n  lucide.createIcons();\n};\n\nfunction studentModal(id){\n  const editing = id? JSON.parse(JSON.stringify(studentById(id))) : {id:uid(),name:'',grade:'Grade 1',dob:'',color:'Mint',avatar:'📚',active:true,notes:'',subjects:[]};\n  const colorKeys=Object.keys(STUDENT_COLORS);\n  openModal(`\n    <div class=\"modal-head\"><h3>${id?'Edit':'Add'} student<\u002Fh3><button class=\"btn icon ghost\" onclick=\"closeModal()\"><i data-lucide=\"x\"><\u002Fi><\u002Fbutton><\u002Fdiv>\n    <div class=\"modal-body\">\n      <div class=\"row\" style=\"gap:14px\">\n        <label class=\"fld\" style=\"flex:2\"><span>Name<\u002Fspan><input class=\"input\" id=\"smName\" value=\"${esc(editing.name)}\" placeholder=\"Full name\" /><\u002Flabel>\n        <label class=\"fld\" style=\"flex:1\"><span>Grade / Year<\u002Fspan><select class=\"input\" id=\"smGrade\">${GRADE_LEVELS.map(g=>`<option ${g===editing.grade?'selected':''}>${g}<\u002Foption>`).join('')}<\u002Fselect><\u002Flabel>\n      <\u002Fdiv>\n      <label class=\"fld\"><span>Date of birth<\u002Fspan><input class=\"input\" type=\"date\" id=\"smDob\" value=\"${editing.dob}\" /><\u002Flabel>\n      <label class=\"fld\"><span>Colour tag<\u002Fspan><\u002Flabel>\n      <div class=\"swatches\" id=\"smColors\" style=\"margin:-8px 0 14px\">\n        ${colorKeys.map(c=>`<div class=\"swatch ${c===editing.color?'on':''}\" data-c=\"${c}\" style=\"background:${STUDENT_COLORS[c]}\" title=\"${c}\"><i data-lucide=\"check\"><\u002Fi><\u002Fdiv>`).join('')}\n      <\u002Fdiv>\n      <label class=\"fld\"><span>Avatar<\u002Fspan><\u002Flabel>\n      <div class=\"emoji-pick\" id=\"smAvatars\" style=\"margin:-8px 0 14px\">\n        ${AVATARS.map(a=>`<button data-a=\"${a}\" class=\"${a===editing.avatar?'on':''}\">${a}<\u002Fbutton>`).join('')}\n      <\u002Fdiv>\n      <label class=\"fld\"><span>Learning style notes (optional)<\u002Fspan><textarea class=\"input\" id=\"smNotes\" placeholder=\"e.g. Visual learner, needs movement breaks…\">${esc(editing.notes)}<\u002Ftextarea><\u002Flabel>\n      <div class=\"divider\"><\u002Fdiv>\n      <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:10px\">\n        <span style=\"font-weight:600;font-size:14px\">Subjects<\u002Fspan>\n        <button class=\"btn sm\" id=\"smAddSubj\"><i data-lucide=\"plus\"><\u002Fi> Add subject<\u002Fbutton>\n      <\u002Fdiv>\n      <div id=\"smSubjList\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"modal-foot\"><button class=\"btn ghost\" onclick=\"closeModal()\">Cancel<\u002Fbutton><button class=\"btn primary\" id=\"smSave\">Save student<\u002Fbutton><\u002Fdiv>\n  `,{wide:true,onOpen:box=>{\n    let color=editing.color, avatar=editing.avatar, subjects=editing.subjects.slice();\n    box.querySelector('#smColors').onclick=e=>{ const sw=e.target.closest('.swatch'); if(!sw)return; color=sw.dataset.c; box.querySelectorAll('#smColors .swatch').forEach(x=>x.classList.toggle('on',x===sw)); };\n    box.querySelector('#smAvatars').onclick=e=>{ const bt=e.target.closest('button'); if(!bt)return; avatar=bt.dataset.a; box.querySelectorAll('#smAvatars button').forEach(x=>x.classList.toggle('on',x===bt)); };\n    const subjEl=box.querySelector('#smSubjList');\n    function renderSubj(){\n      subjEl.innerHTML = subjects.map((su,i)=>`\n        <div style=\"display:flex;gap:8px;align-items:center;margin-bottom:8px\">\n          <input type=\"color\" value=\"${su.color}\" data-i=\"${i}\" class=\"subjColor\" style=\"width:34px;height:34px;border:1px solid var(--border);border-radius:8px;background:none;padding:2px;cursor:pointer\" />\n          <input class=\"input subjName\" data-i=\"${i}\" value=\"${esc(su.name)}\" placeholder=\"Subject name\" style=\"flex:1\" />\n          <select class=\"input subjFreq\" data-i=\"${i}\" style=\"width:110px\">${[1,2,3,4,5].map(n=>`<option value=\"${n}\" ${n===su.freq?'selected':''}>${n} day${n>1?'s':''}/wk<\u002Foption>`).join('')}<\u002Fselect>\n          <button class=\"btn icon ghost subjDel\" data-i=\"${i}\" style=\"color:#E05C5C\"><i data-lucide=\"x\"><\u002Fi><\u002Fbutton>\n        <\u002Fdiv>`).join('') || '<p class=\"muted\" style=\"font-size:13px;padding:4px 0 8px\">No subjects yet — add at least one.<\u002Fp>';\n      lucide.createIcons();\n      subjEl.querySelectorAll('.subjName').forEach(inp=> inp.oninput=()=>subjects[+inp.dataset.i].name=inp.value);\n      subjEl.querySelectorAll('.subjColor').forEach(inp=> inp.oninput=()=>subjects[+inp.dataset.i].color=inp.value);\n      subjEl.querySelectorAll('.subjFreq').forEach(inp=> inp.onchange=()=>subjects[+inp.dataset.i].freq=+inp.value);\n      subjEl.querySelectorAll('.subjDel').forEach(b=> b.onclick=()=>{ subjects.splice(+b.dataset.i,1); renderSubj(); });\n    }\n    renderSubj();\n    box.querySelector('#smAddSubj').onclick=()=>{ subjects.push({id:uid(),name:'',color:SUBJECT_PALETTE[subjects.length%SUBJECT_PALETTE.length],freq:3}); renderSubj(); };\n    box.querySelector('#smSave').onclick=()=>{\n      const name=box.querySelector('#smName').value.trim();\n      if(!name){ toast('Enter a name','alert-triangle'); return; }\n      subjects = subjects.filter(s=>s.name.trim());\n      const data={ id:editing.id, name, grade:box.querySelector('#smGrade').value, dob:box.querySelector('#smDob').value, color, avatar, active:editing.active, notes:box.querySelector('#smNotes').value.trim(), subjects };\n      if(id){ const idx=DB.students.findIndex(x=>x.id===id); DB.students[idx]=data; }\n      else { DB.students.push(data); if(!DB.grades[data.id]) DB.grades[data.id]={}; }\n      save(true); closeModal(); RENDERERS.students(document.getElementById('view-students')); lucide.createIcons();\n    };\n  }});\n}\n\nRENDERERS.subjects = function(view){\n  view.innerHTML=`\n    <div class=\"pagehead\">\n      <div><div class=\"lead\">Add, rename, recolor, or remove subjects for each student. Changes appear immediately in lesson planning, grades, and reports.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"grid\" style=\"grid-template-columns:repeat(auto-fill,minmax(330px,1fr))\">\n      ${DB.students.map(s=>`<div class=\"card pad\">\n        <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:14px\">\n          <div class=\"avatar\" style=\"background:${studentColor(s)}22\">${s.avatar}<\u002Fdiv>\n          <div style=\"flex:1\"><h3 style=\"font-size:17px\">${esc(s.name)}<\u002Fh3><div class=\"muted\" style=\"font-size:12px\">${s.subjects.length} subjects<\u002Fdiv><\u002Fdiv>\n          <button class=\"btn primary sm manageSubjects\" data-id=\"${s.id}\"><i data-lucide=\"pencil\"><\u002Fi> Manage subjects<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:7px\">\n          ${s.subjects.map(su=>`<span class=\"chip\" style=\"background:${su.color}22;color:var(--text-primary)\"><span class=\"dot\" style=\"background:${su.color}\"><\u002Fspan>${esc(su.name)} <span class=\"muted\">· ${su.freq}d/wk<\u002Fspan><\u002Fspan>`).join('')||'<span class=\"muted\">No subjects added.<\u002Fspan>'}\n        <\u002Fdiv>\n      <\u002Fdiv>`).join('')}\n    <\u002Fdiv>`;\n  view.querySelectorAll('.manageSubjects').forEach(b=>b.onclick=()=>subjectModal(b.dataset.id));\n  lucide.createIcons();\n};\n\nfunction subjectModal(studentId){\n  const student=studentById(studentId);\n  let subjects=JSON.parse(JSON.stringify(student.subjects||[]));\n  openModal(`\n    <div class=\"modal-head\"><div><h3>Manage subjects<\u002Fh3><div class=\"muted\" style=\"font-size:12.5px\">${esc(student.name)}<\u002Fdiv><\u002Fdiv><button class=\"btn icon ghost\" onclick=\"closeModal()\"><i data-lucide=\"x\"><\u002Fi><\u002Fbutton><\u002Fdiv>\n    <div class=\"modal-body\">\n      <p class=\"muted\" style=\"font-size:13px;margin-bottom:14px\">Edit a subject name or color below, or use Add subject to create another.<\u002Fp>\n      <div id=\"subjectManagerList\"><\u002Fdiv>\n      <button class=\"btn\" id=\"subjectManagerAdd\"><i data-lucide=\"plus\"><\u002Fi> Add subject<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"modal-foot\"><button class=\"btn ghost\" onclick=\"closeModal()\">Cancel<\u002Fbutton><button class=\"btn primary\" id=\"subjectManagerSave\">Save subjects<\u002Fbutton><\u002Fdiv>\n  `,{wide:true,onOpen:box=>{\n    const list=box.querySelector('#subjectManagerList');\n    function render(){\n      list.innerHTML=subjects.map((su,i)=>`\n        <div style=\"display:flex;gap:8px;align-items:center;margin-bottom:9px\">\n          <input type=\"color\" value=\"${su.color}\" data-i=\"${i}\" class=\"subjectManagerColor\" style=\"width:38px;height:38px;border:1px solid var(--border);border-radius:8px;background:none;padding:2px\" />\n          <input class=\"input subjectManagerName\" data-i=\"${i}\" value=\"${esc(su.name)}\" placeholder=\"Subject name\" style=\"flex:1\" />\n          <select class=\"input subjectManagerFreq\" data-i=\"${i}\" style=\"width:125px\">${[1,2,3,4,5].map(n=>`<option value=\"${n}\" ${n===su.freq?'selected':''}>${n} day${n>1?'s':''}/wk<\u002Foption>`).join('')}<\u002Fselect>\n          <button class=\"btn icon ghost subjectManagerDelete\" data-i=\"${i}\" aria-label=\"Remove subject\" style=\"color:#E05C5C\"><i data-lucide=\"trash-2\"><\u002Fi><\u002Fbutton>\n        <\u002Fdiv>`).join('')||'<p class=\"muted\" style=\"margin-bottom:12px\">No subjects yet.<\u002Fp>';\n      list.querySelectorAll('.subjectManagerName').forEach(x=>x.oninput=()=>subjects[+x.dataset.i].name=x.value);\n      list.querySelectorAll('.subjectManagerColor').forEach(x=>x.oninput=()=>subjects[+x.dataset.i].color=x.value);\n      list.querySelectorAll('.subjectManagerFreq').forEach(x=>x.onchange=()=>subjects[+x.dataset.i].freq=+x.value);\n      list.querySelectorAll('.subjectManagerDelete').forEach(x=>x.onclick=()=>{ subjects.splice(+x.dataset.i,1); render(); });\n      lucide.createIcons();\n    }\n    render();\n    box.querySelector('#subjectManagerAdd').onclick=()=>{ subjects.push({id:uid(),name:'',color:SUBJECT_PALETTE[subjects.length%SUBJECT_PALETTE.length],freq:3}); render(); };\n    box.querySelector('#subjectManagerSave').onclick=()=>{\n      student.subjects=subjects.filter(s=>s.name.trim()).map(s=>({...s,name:s.name.trim()}));\n      save(true); closeModal(); RENDERERS.subjects(document.getElementById('view-subjects')); lucide.createIcons();\n    };\n  }});\n}\n\n/* ============================================================\n   TAB 3 — LESSON PLANNER\n   ============================================================ */\nRENDERERS.lessons = function(view){\n  const students=activeStudents();\n  if(!students.length){ view.innerHTML=`<div class=\"empty card pad\"><i data-lucide=\"book-open\"><\u002Fi><h3>No active students<\u002Fh3><p>Add a student to plan lessons.<\u002Fp><\u002Fdiv>`; lucide.createIcons(); return; }\n  if(!UI.lpStudent || !students.find(s=>s.id===UI.lpStudent)) UI.lpStudent=students[0].id;\n  if(!UI.lpWeekStart) UI.lpWeekStart = ymd(mondayOf(appToday()));\n  if(!UI.lpView) UI.lpView='grid';\n  const stu=studentById(UI.lpStudent);\n  const wkStart=parseYmd(UI.lpWeekStart);\n  const term=DB.settings.terms.find(t=> UI.lpWeekStart>=t.start && UI.lpWeekStart<=t.end);\n  const wkNum = term? Math.floor(daysBetween(term.start,UI.lpWeekStart)/7)+1 : '–';\n\n  view.innerHTML=`\n    <div class=\"tabstrip\" id=\"lpStuTabs\">\n      ${students.map(s=>`<button class=\"${s.id===UI.lpStudent?'on':''}\" data-s=\"${s.id}\" style=\"${s.id===UI.lpStudent?`background:${studentColor(s)}`:''}\"><span class=\"dot\" style=\"background:${studentColor(s)}\"><\u002Fspan>${esc(s.name.split(' ')[0])}<\u002Fbutton>`).join('')}\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px;flex-wrap:wrap\">\n      <div style=\"display:flex;align-items:center;gap:10px\">\n        <button class=\"btn icon\" id=\"lpPrev\"><i data-lucide=\"chevron-left\"><\u002Fi><\u002Fbutton>\n        <div style=\"text-align:center;min-width:200px\">\n          <div style=\"font-family:'Fraunces';font-weight:600;font-size:17px\">Week ${wkNum}${term?', Quarter '+term.n:''}<\u002Fdiv>\n          <div class=\"muted\" style=\"font-size:12.5px\">${fmtDate(wkStart,{day:'numeric',month:'short'})} – ${fmtDate(addDays(wkStart,4),{day:'numeric',month:'short',year:'numeric'})}<\u002Fdiv>\n        <\u002Fdiv>\n        <button class=\"btn icon\" id=\"lpNext\"><i data-lucide=\"chevron-right\"><\u002Fi><\u002Fbutton>\n        <button class=\"btn sm ghost\" id=\"lpToday\">This week<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap\">\n        <button class=\"btn\" id=\"lpManageSubjects\"><i data-lucide=\"book-copy\"><\u002Fi> Manage subjects<\u002Fbutton>\n        <div class=\"seg\" id=\"lpViewSeg\">\n          <button data-v=\"grid\" class=\"${UI.lpView==='grid'?'on':''}\">Calendar<\u002Fbutton>\n          <button data-v=\"list\" class=\"${UI.lpView==='list'?'on':''}\">List<\u002Fbutton>\n          <button data-v=\"print\" class=\"${UI.lpView==='print'?'on':''}\">Print<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div id=\"lpBody\"><\u002Fdiv>\n  `;\n  view.querySelectorAll('#lpStuTabs button').forEach(b=> b.onclick=()=>{ UI.lpStudent=b.dataset.s; RENDERERS.lessons(view); lucide.createIcons(); });\n  view.querySelector('#lpPrev').onclick=()=>{ UI.lpWeekStart=ymd(addDays(wkStart,-7)); RENDERERS.lessons(view); lucide.createIcons(); };\n  view.querySelector('#lpNext').onclick=()=>{ UI.lpWeekStart=ymd(addDays(wkStart,7)); RENDERERS.lessons(view); lucide.createIcons(); };\n  view.querySelector('#lpToday').onclick=()=>{ UI.lpWeekStart=ymd(mondayOf(appToday())); RENDERERS.lessons(view); lucide.createIcons(); };\n  view.querySelector('#lpManageSubjects').onclick=()=>go('subjects');\n  view.querySelectorAll('#lpViewSeg button').forEach(b=> b.onclick=()=>{ UI.lpView=b.dataset.v; RENDERERS.lessons(view); lucide.createIcons(); });\n\n  const body=view.querySelector('#lpBody');\n  if(UI.lpView==='grid') renderLpGrid(body,stu,wkStart);\n  else if(UI.lpView==='list') renderLpList(body,stu,wkStart);\n  else renderLpPrint(body,stu,wkStart,wkNum,term);\n  lucide.createIcons();\n};\n\nfunction renderLpGrid(body,stu,wkStart){\n  const weekLessons=[];\n  DAYS.forEach((d,i)=>{\n    const date=ymd(addDays(wkStart,i));\n    stu.subjects.forEach(su=>{ const l=lessonFor(stu.id,su.id,date); if(l) weekLessons.push({date,su,l}); });\n  });\n  const lessonMinutes=weekLessons.flatMap(x=>[timeToMinutes(x.l.startTime||'09:00'),timeToMinutes(x.l.endTime||'09:30')]);\n  const firstMinute=Math.min(8*60,...lessonMinutes);\n  const lastMinute=Math.max(16*60+30,...lessonMinutes);\n  const slots=Array.from({length:Math.floor((lastMinute-firstMinute)/30)+1},(_,i)=>timeFromMinutes(firstMinute+i*30));\n  body.innerHTML=`<div class=\"weekgrid-wrap\"><div class=\"weekgrid\">\n    <div class=\"wg-h\">Time<\u002Fdiv>\n    ${DAYS.map((d,i)=>`<div class=\"wg-h day\">${d}<small>${fmtDate(addDays(wkStart,i),{day:'numeric',month:'short'})}<\u002Fsmall><\u002Fdiv>`).join('')}\n    ${slots.map(slot=>`\n      <div class=\"wg-time mono\">${slot}<\u002Fdiv>\n      ${DAYS.map((d,i)=>{\n        const date=ymd(addDays(wkStart,i));\n        const starts=stu.subjects.map(su=>({su,l:lessonFor(stu.id,su.id,date)})).filter(x=>x.l&&(x.l.startTime||'09:00')===slot).sort((a,b)=>(a.l.startTime||'').localeCompare(b.l.startTime||''));\n        const covering=stu.subjects.map(su=>({su,l:lessonFor(stu.id,su.id,date)})).find(x=>x.l&&timeToMinutes(x.l.startTime||'09:00')<timeToMinutes(slot)&&timeToMinutes(x.l.endTime||'09:30')>timeToMinutes(slot));\n        return `<div class=\"wg-cell ${starts.length?'has-lesson':''} ${covering?'covered-slot':''}\" data-stu=\"${stu.id}\" data-date=\"${date}\" data-start=\"${slot}\" ${covering?`data-covered-by=\"${covering.su.id}\"`:''}>\n          ${starts.length?starts.map(({su,l})=>`<div class=\"les ${l.done?'done':''}\" data-subj=\"${su.id}\" style=\"border-left-color:${su.color};background:color-mix(in srgb, ${su.color} 12%, var(--surface));height:${Math.max(56,Math.ceil((l.duration||30)/30)*67-10)}px\">\n            <span class=\"subject\">${esc(su.name)}<\u002Fspan><span class=\"topic\">${esc(l.topic||'(untitled)')}<\u002Fspan>\n            <div class=\"meta\">${l.startTime}–${l.endTime} · ${l.done?'✓ done':esc(l.status)}<\u002Fdiv>\n          <\u002Fdiv>`).join(''):covering?'':`<div class=\"wg-empty\"><i data-lucide=\"plus\"><\u002Fi><\u002Fdiv>`}\n        <\u002Fdiv>`;\n      }).join('')}\n    `).join('')}\n  <\u002Fdiv><\u002Fdiv>`;\n  body.querySelectorAll('.wg-cell').forEach(c=>c.onclick=e=>{\n    const lesson=e.target.closest('.les');\n    if(lesson) lessonModal(c.dataset.stu,lesson.dataset.subj,c.dataset.date);\n    else if(c.dataset.coveredBy) lessonModal(c.dataset.stu,c.dataset.coveredBy,c.dataset.date);\n    else newTimedLessonModal(c.dataset.stu,c.dataset.date,c.dataset.start);\n  });\n}\n\nfunction renderLpList(body,stu,wkStart){\n  const items=[];\n  DAYS.forEach((d,i)=>{ const date=ymd(addDays(wkStart,i));\n    stu.subjects.forEach(su=>{ const l=lessonFor(stu.id,su.id,date); if(l) items.push({d,date,su,l}); });\n  });\n  items.sort((a,b)=>a.date.localeCompare(b.date)||(a.l.startTime||'').localeCompare(b.l.startTime||''));\n  if(!items.length){ body.innerHTML=`<div class=\"empty card pad\"><i data-lucide=\"calendar-x\"><\u002Fi><h3>No lessons this week<\u002Fh3><p>Switch to grid view and click a cell to add one.<\u002Fp><\u002Fdiv>`; return; }\n  body.innerHTML=`<div class=\"card\" style=\"overflow:hidden\"><table class=\"tbl\">\n    <thead><tr><th>Day<\u002Fth><th>Time<\u002Fth><th>Subject<\u002Fth><th>Topic<\u002Fth><th>Method<\u002Fth><th>Duration<\u002Fth><th>Status<\u002Fth><th><\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>${items.map(it=>`<tr data-stu=\"${stu.id}\" data-subj=\"${it.su.id}\" data-date=\"${it.date}\" style=\"cursor:pointer\">\n      <td><b>${it.d}<\u002Fb> <span class=\"muted\">${fmtDate(parseYmd(it.date),{day:'numeric',month:'short'})}<\u002Fspan><\u002Ftd>\n      <td class=\"mono\">${it.l.startTime&&it.l.endTime?`${it.l.startTime}–${it.l.endTime}`:'—'}<\u002Ftd>\n      <td><span class=\"chip\" style=\"background:${it.su.color}22;color:var(--text-primary)\"><span class=\"dot\" style=\"background:${it.su.color}\"><\u002Fspan>${esc(it.su.name)}<\u002Fspan><\u002Ftd>\n      <td style=\"font-weight:600\">${esc(it.l.topic||'(untitled)')}<\u002Ftd>\n      <td class=\"muted\">${esc(it.l.method)}<\u002Ftd>\n      <td class=\"mono\">${it.l.duration}m<\u002Ftd>\n      <td>${it.l.done?'<span class=\"badge green\">Completed<\u002Fspan>':`<span class=\"badge grey\">${esc(it.l.status)}<\u002Fspan>`}<\u002Ftd>\n      <td><i data-lucide=\"chevron-right\" style=\"width:16px;color:var(--text-muted)\"><\u002Fi><\u002Ftd>\n    <\u002Ftr>`).join('')}<\u002Ftbody>\n  <\u002Ftable><\u002Fdiv>`;\n  body.querySelectorAll('tr[data-stu]').forEach(r=> r.onclick=()=> lessonModal(r.dataset.stu,r.dataset.subj,r.dataset.date));\n}\n\nfunction renderLpPrint(body,stu,wkStart,wkNum,term){\n  body.innerHTML=`\n    <div style=\"display:flex;justify-content:flex-end;margin-bottom:14px\"><button class=\"btn primary no-print\" onclick=\"window.print()\"><i data-lucide=\"printer\"><\u002Fi> Print this week<\u002Fbutton><\u002Fdiv>\n    <div class=\"card pad report-doc\">\n      <div style=\"text-align:center;border-bottom:2px solid var(--text-primary);padding-bottom:14px;margin-bottom:18px\">\n        <h2 style=\"font-size:22px\">${esc(stu.name)} — Weekly Lesson Plan<\u002Fh2>\n        <div class=\"muted\">${esc(DB.settings.familyName)} · Week ${wkNum}${term?', Quarter '+term.n:''} · ${fmtDate(wkStart,{day:'numeric',month:'short'})}–${fmtDate(addDays(wkStart,4),{day:'numeric',month:'short',year:'numeric'})}<\u002Fdiv>\n      <\u002Fdiv>\n      <table class=\"tbl\"><thead><tr><th>Day<\u002Fth><th>Time<\u002Fth><th>Subject<\u002Fth><th>Topic & Objectives<\u002Fth><th>Method<\u002Fth><th>Mins<\u002Fth><\u002Ftr><\u002Fthead><tbody>\n      ${DAYS.map((d,i)=>{ const date=ymd(addDays(wkStart,i));\n        const rows=stu.subjects.map(su=>({su,l:lessonFor(stu.id,su.id,date)})).filter(x=>x.l).sort((a,b)=>(a.l.startTime||'').localeCompare(b.l.startTime||'')).map(({su,l})=>\n          `<tr><td><b>${d}<\u002Fb><\u002Ftd><td class=\"mono\">${l.startTime&&l.endTime?`${l.startTime}–${l.endTime}`:'—'}<\u002Ftd><td>${esc(su.name)}<\u002Ftd><td><b>${esc(l.topic||'—')}<\u002Fb>${l.objectives?`<div class=\"muted\" style=\"font-size:12px\">${esc(l.objectives)}<\u002Fdiv>`:''}<\u002Ftd><td>${esc(l.method)}<\u002Ftd><td class=\"mono\">${l.duration}<\u002Ftd><\u002Ftr>`\n        ).join('');\n        return rows||'';\n      }).join('')}\n      <\u002Ftbody><\u002Ftable>\n    <\u002Fdiv>`;\n}\n\nfunction newTimedLessonModal(stuId,date,startTime){\n  const stu=studentById(stuId);\n  const options=Array.from({length:31},(_,i)=>timeFromMinutes(360+i*30));\n  const defaultEnd=timeFromMinutes(timeToMinutes(startTime)+30);\n  openModal(`\n    <div class=\"modal-head\"><div><h3>Add lesson<\u002Fh3><div class=\"muted\" style=\"font-size:12.5px\">${esc(stu.name)} · ${fmtLong(parseYmd(date))} · ${startTime}<\u002Fdiv><\u002Fdiv><button class=\"btn icon ghost\" onclick=\"closeModal()\"><i data-lucide=\"x\"><\u002Fi><\u002Fbutton><\u002Fdiv>\n    <div class=\"modal-body\">\n      <label class=\"fld\"><span>Subject<\u002Fspan><select class=\"input\" id=\"ntSubject\">${stu.subjects.map(su=>`<option value=\"${su.id}\">${esc(su.name)}<\u002Foption>`).join('')}<\u002Fselect><\u002Flabel>\n      <label class=\"fld\"><span>Topic / Title<\u002Fspan><input class=\"input\" id=\"ntTopic\" placeholder=\"What are you covering?\" /><\u002Flabel>\n      <div class=\"row\" style=\"gap:14px\">\n        <label class=\"fld\" style=\"flex:1\"><span>Start time<\u002Fspan><select class=\"input\" id=\"ntStart\">${options.map(t=>`<option value=\"${t}\" ${t===startTime?'selected':''}>${t}<\u002Foption>`).join('')}<\u002Fselect><\u002Flabel>\n        <label class=\"fld\" style=\"flex:1\"><span>End time<\u002Fspan><select class=\"input\" id=\"ntEnd\">${options.map(t=>`<option value=\"${t}\" ${t===defaultEnd?'selected':''}>${t}<\u002Foption>`).join('')}<\u002Fselect><\u002Flabel>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"modal-foot\"><button class=\"btn ghost\" onclick=\"closeModal()\">Cancel<\u002Fbutton><button class=\"btn primary\" id=\"ntSave\">Add lesson<\u002Fbutton><\u002Fdiv>\n  `,{onOpen:box=>{\n    box.querySelector('#ntSave').onclick=()=>{\n      const subjId=box.querySelector('#ntSubject').value, topic=box.querySelector('#ntTopic').value.trim();\n      const start=box.querySelector('#ntStart').value, end=box.querySelector('#ntEnd').value;\n      if(!topic){ toast('Enter a topic','alert-triangle'); return; }\n      const duration=timeToMinutes(end)-timeToMinutes(start);\n      if(duration<=0){ toast('End time must be after start time','alert-triangle'); return; }\n      const key=`${stuId}|${subjId}|${date}`;\n      if(DB.lessons[key]){ toast('That subject already has a lesson on this day','alert-triangle'); return; }\n      DB.lessons[key]={id:uid(),topic,objectives:'',materials:'',method:'Direct Instruction',assessment:'None',startTime:start,endTime:end,duration,notes:'',status:'Planned',done:false};\n      save(true); closeModal(); RENDERERS.lessons(document.getElementById('view-lessons')); lucide.createIcons();\n    };\n  }});\n}\n\nfunction lessonModal(stuId,subjId,date){\n  const stu=studentById(stuId); const su=stu.subjects.find(x=>x.id===subjId);\n  const key=`${stuId}|${subjId}|${date}`;\n  const exists=!!DB.lessons[key];\n  const l=Object.assign({topic:'',objectives:'',materials:'',method:'Direct Instruction',assessment:'None',startTime:'',endTime:'',duration:30,notes:'',status:'Planned',done:false}, DB.lessons[key]||{});\n  if(!l.startTime) l.startTime='09:00';\n  if(!l.endTime) l.endTime=timeFromMinutes(9*60+Math.max(30,Math.ceil((l.duration||30)/30)*30));\n  const timeOptions=Array.from({length:31},(_,i)=>{ const mins=360+i*30; return `${pad(Math.floor(mins/60))}:${pad(mins%60)}`; });\n  openModal(`\n    <div class=\"modal-head\"><div><h3>${esc(su.name)} lesson<\u002Fh3><div class=\"muted\" style=\"font-size:12.5px\">${esc(stu.name)} · ${fmtLong(parseYmd(date))}<\u002Fdiv><\u002Fdiv><button class=\"btn icon ghost\" onclick=\"closeModal()\"><i data-lucide=\"x\"><\u002Fi><\u002Fbutton><\u002Fdiv>\n    <div class=\"modal-body\">\n      <label class=\"fld\"><span>Topic / Title<\u002Fspan><input class=\"input\" id=\"lmTopic\" value=\"${esc(l.topic)}\" placeholder=\"What are you covering?\" /><\u002Flabel>\n      <label class=\"fld\"><span>Learning objectives<\u002Fspan><textarea class=\"input\" id=\"lmObj\" placeholder=\"By the end of this lesson…\">${esc(l.objectives)}<\u002Ftextarea><\u002Flabel>\n      <label class=\"fld\"><span>Materials / Resources<\u002Fspan><textarea class=\"input\" id=\"lmMat\" placeholder=\"Books, links, supplies…\">${esc(l.materials)}<\u002Ftextarea><\u002Flabel>\n      <div class=\"row\" style=\"gap:14px\">\n        <label class=\"fld\" style=\"flex:1\"><span>Method<\u002Fspan><select class=\"input\" id=\"lmMethod\">${METHODS.map(m=>`<option ${m===l.method?'selected':''}>${m}<\u002Foption>`).join('')}<\u002Fselect><\u002Flabel>\n        <label class=\"fld\" style=\"flex:1\"><span>Assessment<\u002Fspan><select class=\"input\" id=\"lmAssess\">${ASSESS_TYPES.map(m=>`<option ${m===l.assessment?'selected':''}>${m}<\u002Foption>`).join('')}<\u002Fselect><\u002Flabel>\n      <\u002Fdiv>\n      <div class=\"row\" style=\"gap:14px\">\n        <label class=\"fld\" style=\"flex:1\"><span>Start time<\u002Fspan><select class=\"input\" id=\"lmStart\">${timeOptions.map(t=>`<option value=\"${t}\" ${t===l.startTime?'selected':''}>${t}<\u002Foption>`).join('')}<\u002Fselect><\u002Flabel>\n        <label class=\"fld\" style=\"flex:1\"><span>End time<\u002Fspan><select class=\"input\" id=\"lmEnd\">${timeOptions.map(t=>`<option value=\"${t}\" ${t===l.endTime?'selected':''}>${t}<\u002Foption>`).join('')}<\u002Fselect><\u002Flabel>\n      <\u002Fdiv>\n      <div class=\"row\" style=\"gap:14px\">\n        <label class=\"fld\" style=\"flex:1\"><span>Duration<\u002Fspan><input class=\"input\" id=\"lmDur\" value=\"${l.duration} minutes\" readonly /><\u002Flabel>\n        <label class=\"fld\" style=\"flex:1\"><span>Status<\u002Fspan><select class=\"input\" id=\"lmStatus\">${LESSON_STATUS.map(m=>`<option ${m===l.status?'selected':''}>${m}<\u002Foption>`).join('')}<\u002Fselect><\u002Flabel>\n      <\u002Fdiv>\n      <label class=\"fld\"><span>Notes<\u002Fspan><textarea class=\"input\" id=\"lmNotes\">${esc(l.notes)}<\u002Ftextarea><\u002Flabel>\n      <label style=\"display:flex;align-items:center;gap:10px;cursor:pointer;font-weight:600;font-size:14px\">\n        <input type=\"checkbox\" id=\"lmDone\" ${l.done?'checked':''} style=\"width:18px;height:18px;accent-color:var(--primary)\" /> Mark complete (updates Dashboard)\n      <\u002Flabel>\n    <\u002Fdiv>\n    <div class=\"modal-foot\">\n      ${exists?'<button class=\"btn ghost\" id=\"lmDelete\" style=\"color:#E05C5C;margin-right:auto\"><i data-lucide=\"trash-2\"><\u002Fi> Delete<\u002Fbutton>':''}\n      <button class=\"btn ghost\" onclick=\"closeModal()\">Cancel<\u002Fbutton>\n      <button class=\"btn primary\" id=\"lmSave\">Save lesson<\u002Fbutton>\n    <\u002Fdiv>\n  `,{wide:true,onOpen:box=>{\n    const start=box.querySelector('#lmStart'), end=box.querySelector('#lmEnd'), dur=box.querySelector('#lmDur');\n    const updateDuration=()=>{\n      const [sh,sm]=start.value.split(':').map(Number), [eh,em]=end.value.split(':').map(Number);\n      const minutes=(eh*60+em)-(sh*60+sm);\n      dur.value=minutes>0?`${minutes} minutes`:'Choose an end time after the start';\n    };\n    start.onchange=updateDuration; end.onchange=updateDuration; updateDuration();\n    if(exists) box.querySelector('#lmDelete').onclick=()=>{ delete DB.lessons[key]; save(true); closeModal(); RENDERERS.lessons(document.getElementById('view-lessons')); lucide.createIcons(); };\n    box.querySelector('#lmSave').onclick=()=>{\n      const done=box.querySelector('#lmDone').checked;\n      const status=box.querySelector('#lmStatus').value;\n      const [sh,sm]=start.value.split(':').map(Number), [eh,em]=end.value.split(':').map(Number);\n      const duration=(eh*60+em)-(sh*60+sm);\n      if(duration<=0){ toast('End time must be after start time','alert-triangle'); return; }\n      DB.lessons[key]={ id:l.id||uid(), topic:box.querySelector('#lmTopic').value.trim(), objectives:box.querySelector('#lmObj').value.trim(),\n        materials:box.querySelector('#lmMat').value.trim(), method:box.querySelector('#lmMethod').value, assessment:box.querySelector('#lmAssess').value,\n        startTime:start.value, endTime:end.value, duration, notes:box.querySelector('#lmNotes').value.trim(),\n        status: done?'Completed':status, done };\n      save(true); closeModal(); RENDERERS.lessons(document.getElementById('view-lessons')); lucide.createIcons();\n    };\n  }});\n}\n\n/* ============================================================\n   TAB 4 — ATTENDANCE\n   ============================================================ */\nconst ATT_CYCLE=['present','absent','excused','sick','holiday',''];\nconst ATT_LABEL={present:'P',absent:'A',excused:'E',sick:'S',holiday:'H','':'·'};\nRENDERERS.attendance = function(view){\n  const students=activeStudents();\n  if(!students.length){ view.innerHTML=`<div class=\"empty card pad\"><i data-lucide=\"calendar-check\"><\u002Fi><h3>No active students<\u002Fh3><\u002Fdiv>`; lucide.createIcons(); return; }\n  if(!UI.attMonth) UI.attMonth=ymd(new Date(appToday().getFullYear(),appToday().getMonth(),1));\n  if(!UI.attScope) UI.attScope='term';\n  const monthStart=parseYmd(UI.attMonth);\n  const year=monthStart.getFullYear(), month=monthStart.getMonth();\n  const daysInMonth=new Date(year,month+1,0).getDate();\n  const holidays=new Set((DB.settings.holidays||[]).map(h=>h.date));\n  const term=DB.settings.terms.find(t=>t.n===DB.settings.currentTerm);\n\n  view.innerHTML=`\n    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px;flex-wrap:wrap\">\n      <div style=\"display:flex;align-items:center;gap:10px\">\n        <button class=\"btn icon\" id=\"amPrev\"><i data-lucide=\"chevron-left\"><\u002Fi><\u002Fbutton>\n        <div style=\"font-family:'Fraunces';font-weight:600;font-size:18px;min-width:170px;text-align:center\">${monthStart.toLocaleDateString('en-AU',{month:'long',year:'numeric'})}<\u002Fdiv>\n        <button class=\"btn icon\" id=\"amNext\"><i data-lucide=\"chevron-right\"><\u002Fi><\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:10px;align-items:center;flex-wrap:wrap\">\n        <div class=\"seg\" id=\"amScope\">\n          <button data-s=\"term\" class=\"${UI.attScope==='term'?'on':''}\">Quarter to date<\u002Fbutton>\n          <button data-s=\"year\" class=\"${UI.attScope==='year'?'on':''}\">Year to date<\u002Fbutton>\n        <\u002Fdiv>\n        <button class=\"btn\" id=\"amFill\"><i data-lucide=\"check-check\"><\u002Fi> Mark all present today<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"attgrid-wrap\" style=\"margin-bottom:20px\">\n      <table class=\"attgrid\">\n        <thead><tr><th class=\"studcol\">Student<\u002Fth>\n          ${Array.from({length:daysInMonth},(_,d)=>{ const date=new Date(year,month,d+1); return `<th class=\"${isWeekend(date)?'we':''}\">${d+1}<\u002Fth>`; }).join('')}\n        <\u002Ftr><\u002Fthead>\n        <tbody>\n        ${students.map(s=>`<tr>\n          <td class=\"studcol\"><span class=\"dot\" style=\"background:${studentColor(s)};display:inline-block;margin-right:7px\"><\u002Fspan>${esc(s.name.split(' ')[0])}<\u002Ftd>\n          ${Array.from({length:daysInMonth},(_,d)=>{ const date=new Date(year,month,d+1); const ds=ymd(date);\n            if(isWeekend(date)) return `<td><div class=\"att-c weekend\">·<\u002Fdiv><\u002Ftd>`;\n            if(holidays.has(ds)) return `<td><div class=\"att-c holiday\" data-stu=\"${s.id}\" data-date=\"${ds}\" title=\"Holiday\">H<\u002Fdiv><\u002Ftd>`;\n            const st=DB.attendance[`${s.id}|${ds}`]||'';\n            return `<td><div class=\"att-c ${st||'empty'}\" data-stu=\"${s.id}\" data-date=\"${ds}\">${ATT_LABEL[st]}<\u002Fdiv><\u002Ftd>`;\n          }).join('')}\n        <\u002Ftr>`).join('')}\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;gap:16px;align-items:center;flex-wrap:wrap;margin-bottom:18px;font-size:12.5px\">\n      <span class=\"muted\" style=\"font-weight:600\">Legend:<\u002Fspan>\n      <span style=\"display:flex;align-items:center;gap:6px\"><span class=\"att-c present\" style=\"width:24px;height:24px;border-radius:5px\">P<\u002Fspan> Present<\u002Fspan>\n      <span style=\"display:flex;align-items:center;gap:6px\"><span class=\"att-c absent\" style=\"width:24px;height:24px;border-radius:5px\">A<\u002Fspan> Absent<\u002Fspan>\n      <span style=\"display:flex;align-items:center;gap:6px\"><span class=\"att-c excused\" style=\"width:24px;height:24px;border-radius:5px\">E<\u002Fspan> Excused<\u002Fspan>\n      <span style=\"display:flex;align-items:center;gap:6px\"><span class=\"att-c sick\" style=\"width:24px;height:24px;border-radius:5px\">S<\u002Fspan> Sick<\u002Fspan>\n      <span style=\"display:flex;align-items:center;gap:6px\"><span class=\"att-c holiday\" style=\"width:24px;height:24px;border-radius:5px\">H<\u002Fspan> Holiday<\u002Fspan>\n      <span class=\"muted\">· click a cell to cycle status<\u002Fspan>\n    <\u002Fdiv>\n\n    <div id=\"amSummary\" class=\"grid\" style=\"grid-template-columns:repeat(auto-fill,minmax(280px,1fr))\"><\u002Fdiv>\n  `;\n\n  const from = UI.attScope==='term' ? (term?term.start:DB.settings.yearStart) : DB.settings.yearStart;\n  const toStr = ymd(appToday());\n  const sumEl=view.querySelector('#amSummary');\n  sumEl.innerHTML = students.map(s=>{ const st=attendanceStats(s.id,from,toStr); const low=st.rate<85;\n    return `<div class=\"card pad\">\n      <div style=\"display:flex;align-items:center;gap:11px;margin-bottom:14px\">\n        <div class=\"savatar\" style=\"width:38px;height:38px;font-size:19px;background:${studentColor(s)}33\">${s.avatar}<\u002Fdiv>\n        <div style=\"flex:1\"><div style=\"font-weight:600\">${esc(s.name)}<\u002Fdiv><div class=\"muted\" style=\"font-size:12px\">${esc(s.grade)}<\u002Fdiv><\u002Fdiv>\n        <div style=\"text-align:right\"><div class=\"mono\" style=\"font-size:26px;font-wei
